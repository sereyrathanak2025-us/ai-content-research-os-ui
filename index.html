<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Viral Radar — Source Intelligence Engine</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=JetBrains+Mono:wght@400;500;700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0a0b0d;--bg-e:#131518;--bg-c:#17191d;--bd:#262a30;--bd-b:#3a3f47;--acid:#c6ff3d;--acid-d:#8fb82c;--coral:#ff5a36;--text:#f2f3f0;--text-d:#9a9fa6;--text-f:#5c6169;--font-d:'Archivo Black',sans-serif;--font-m:'JetBrains Mono',monospace;--font-b:'Work Sans',sans-serif;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--font-b);-webkit-font-smoothing:antialiased;overflow-x:hidden;}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(var(--bd) 1px,transparent 1px),linear-gradient(90deg,var(--bd) 1px,transparent 1px);background-size:64px 64px;opacity:.2;mask-image:radial-gradient(ellipse 80% 50% at 50% 0%,black 0%,transparent 70%);}
#root{position:relative;z-index:2;}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes blink{0%,45%{opacity:1}50%,100%{opacity:0}}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
::selection{background:var(--acid);color:#0a0b0d;}
::-webkit-scrollbar{width:8px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--bd-b);border-radius:6px}
.shell{max-width:960px;margin:0 auto;padding:0 16px 80px;}
/* Nav */
.nav{display:flex;align-items:center;justify-content:space-between;padding:28px 0 40px;}
.nav-brand{display:flex;align-items:center;gap:10px;font-family:var(--font-m);font-weight:700;font-size:14px;letter-spacing:.06em;text-transform:uppercase;}
.nav-mark{color:var(--acid);font-size:20px;}
.nav-badge{font-family:var(--font-m);font-size:11px;color:var(--acid);border:1px solid var(--acid-d);background:rgba(198,255,61,.07);padding:4px 10px;border-radius:20px;letter-spacing:.05em;}
.nav-actions{display:flex;align-items:center;gap:8px;}
.btn-sm{font-family:var(--font-m);font-size:11px;color:var(--text-d);background:var(--bg-c);border:1px solid var(--bd-b);padding:5px 12px;border-radius:20px;cursor:pointer;transition:all .15s;}
.btn-sm:hover{border-color:var(--acid-d);color:var(--acid);}
/* Hero */
.hero{text-align:center;padding:20px 0 44px;}
.hero-tag{display:inline-flex;align-items:center;gap:8px;font-family:var(--font-m);font-size:11.5px;color:var(--text-d);border:1px solid var(--bd-b);padding:6px 14px;border-radius:20px;margin-bottom:26px;}
.hero-tag .dot{width:6px;height:6px;border-radius:50%;background:var(--acid);animation:pulse 1.6s ease-in-out infinite;}
.hero h1{font-family:var(--font-d);font-size:clamp(32px,6vw,56px);line-height:1.02;text-transform:uppercase;margin-bottom:16px;}
.hero h1 span{color:var(--acid);}
.hero p{font-size:15px;color:var(--text-d);max-width:480px;margin:0 auto;line-height:1.6;}
/* Retention curve */
.ret-curve{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:18px 22px 12px;margin-bottom:24px;display:flex;align-items:flex-end;gap:7px;}
.ret-label{font-size:9px;color:rgba(240,240,245,.22);letter-spacing:.11em;text-transform:uppercase;writing-mode:vertical-rl;transform:rotate(180deg);margin-right:3px;padding-bottom:4px;}
.ret-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
/* Console */
.console{background:var(--bg-e);border:1px solid var(--bd-b);border-radius:14px;padding:4px;box-shadow:0 0 0 1px rgba(198,255,61,.03),0 20px 60px -20px rgba(0,0,0,.6);margin-bottom:24px;}
.console-head{display:flex;align-items:center;gap:7px;padding:12px 16px 8px;font-family:var(--font-m);font-size:11px;color:var(--text-f);}
.cdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.console-body{padding:4px 14px 16px;}
.console-prompt{display:flex;align-items:center;gap:10px;font-family:var(--font-m);font-size:15px;padding:6px 4px 16px;}
.c-caret{color:var(--acid);}
.c-input{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-family:var(--font-m);font-size:15px;}
.c-input::placeholder{color:var(--text-f);}
.c-cursor{display:inline-block;width:8px;height:17px;background:var(--acid);animation:blink 1s step-end infinite;margin-left:-4px;}
.surprise-btn{background:var(--bg-c);border:1px solid var(--bd-b);border-radius:7px;font-size:15px;padding:5px 9px;cursor:pointer;line-height:1;transition:transform .15s,border-color .15s;}
.surprise-btn:hover{border-color:var(--acid-d);transform:rotate(-8deg) scale(1.08);}
.surprise-btn:disabled{opacity:.4;cursor:not-allowed;}
.config-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:0 4px 10px;}
.field-label{font-family:var(--font-m);font-size:11px;color:var(--acid-d);margin-bottom:5px;letter-spacing:.02em;}
.select-wrap{position:relative;}
.select-wrap::after{content:'▾';position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--text-f);font-size:10px;pointer-events:none;}
.select-wrap select{width:100%;appearance:none;background:var(--bg-c);border:1px solid var(--bd);color:var(--text-d);font-family:var(--font-m);font-size:11.5px;padding:9px 26px 9px 11px;border-radius:8px;cursor:pointer;outline:none;transition:border-color .15s;}
.select-wrap select:hover{border-color:var(--bd-b);color:var(--text);}
.select-wrap select:disabled{opacity:.5;cursor:not-allowed;}
.expand-row{padding:8px 4px;border-top:1px dashed var(--bd);}
.expand-label{font-family:var(--font-m);font-size:11px;color:var(--acid-d);margin-bottom:7px;}
.expand-opt{color:var(--text-f);font-weight:400;}
.expand-textarea{width:100%;background:var(--bg-c);border:1px solid var(--bd);color:var(--text);font-family:var(--font-m);font-size:12px;padding:9px 11px;border-radius:8px;resize:vertical;line-height:1.5;outline:none;transition:border-color .15s;}
.expand-textarea:focus{border-color:var(--acid-d);}
.expand-textarea::placeholder{color:var(--text-f);}
.expand-hint{font-size:11px;color:var(--text-f);margin-top:6px;line-height:1.5;}
.example-row{display:flex;flex-wrap:wrap;gap:6px;padding:0 4px 12px;}
.ex-btn{background:var(--bg-c);border:1px solid var(--bd);border-radius:6px;padding:4px 10px;font-size:10px;color:var(--text-f);cursor:pointer;font-weight:600;font-family:var(--font-m);transition:all .12s;}
.ex-btn:hover,.ex-btn.active{background:rgba(198,255,61,.1);border-color:var(--acid-d);color:var(--acid);}
.ex-btn:disabled{opacity:.5;cursor:not-allowed;}
.run-btn{width:100%;background:var(--acid);color:#0a0b0d;border:none;font-family:var(--font-m);font-weight:700;font-size:13px;letter-spacing:.04em;text-transform:uppercase;padding:15px;border-radius:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:transform .12s,box-shadow .12s,background .15s,color .15s;}
.run-btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 8px 24px -8px rgba(198,255,61,.5);}
.run-btn:disabled{background:var(--bd-b);color:var(--text-d);cursor:not-allowed;}
.run-btn.loading{background:rgba(198,255,61,.15);color:var(--acid);}
/* Agent strip */
.agent-strip{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:28px;}
.agent-chip{font-family:var(--font-m);font-size:10.5px;border:1px solid var(--bd);padding:6px 12px;border-radius:20px;letter-spacing:.02em;display:flex;align-items:center;gap:6px;transition:all .2s;cursor:default;}
.agent-chip.idle{color:var(--text-f);}
.agent-chip.loading{color:var(--acid);border-color:var(--acid-d);background:rgba(198,255,61,.06);}
.agent-chip.done{color:#4ade80;border-color:rgba(74,222,128,.35);background:rgba(74,222,128,.06);}
.agent-chip.error{color:var(--coral);border-color:rgba(255,90,54,.35);background:rgba(255,90,54,.06);}
.status-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.status-dot.idle{background:var(--text-f);}
.status-dot.loading{background:var(--acid);animation:pulse .8s ease-in-out infinite;}
.status-dot.done{background:#4ade80;}
.status-dot.error{background:var(--coral);}
/* Spinner */
.spinner{border:2px solid var(--bd);border-top-color:var(--acid);border-radius:50%;width:18px;height:18px;animation:spin .7s linear infinite;flex-shrink:0;}
/* Error box */
.err-box{background:rgba(255,90,54,.08);border:1px solid rgba(255,90,54,.3);border-radius:10px;padding:12px 16px;font-size:13px;font-family:var(--font-m);color:#ffb199;margin-bottom:20px;}
/* Results */
.results{margin-top:40px;animation:fadeUp .4s ease;}
.results-topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:8px;}
.results-topic{font-family:var(--font-d);font-size:clamp(18px,3vw,26px);text-transform:uppercase;}
.results-topic span{color:var(--acid);}
.tab-bar{display:flex;gap:5px;background:rgba(255,255,255,.03);padding:4px;border-radius:12px;border:1px solid rgba(255,255,255,.06);margin-bottom:24px;flex-wrap:wrap;}
.tab-btn{flex:1;min-width:80px;background:transparent;border:1px solid transparent;border-radius:9px;padding:9px 10px;font-family:var(--font-m);font-size:11px;font-weight:700;color:var(--text-f);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px;text-transform:uppercase;letter-spacing:.04em;}
.tab-btn:hover{color:var(--text-d);}
.tab-btn.active{background:rgba(198,255,61,.12);border-color:rgba(198,255,61,.3);color:var(--acid);}
.tab-btn.has-error{color:var(--coral);}
.tab-content{animation:fadeUp .3s ease;}
/* Video cards */
.video-grid{display:grid;gap:10px;}
.v-card{display:flex;gap:12px;background:var(--bg-c);border:1px solid var(--bd);border-radius:10px;padding:10px;text-decoration:none;color:inherit;transition:border-color .15s,transform .15s;}
.v-card:hover{border-color:var(--acid-d);transform:translateX(2px);}
.v-thumb{width:96px;height:60px;flex-shrink:0;border-radius:6px;object-fit:cover;background:var(--bg-e);}
.v-info{min-width:0;display:flex;flex-direction:column;justify-content:center;gap:3px;}
.v-title{font-size:13px;font-weight:600;line-height:1.3;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.v-meta{font-family:var(--font-m);font-size:10px;color:var(--text-f);}
.v-meta .views{color:var(--acid);}
/* Rank cards */
.rank-card{background:var(--bg-c);border:1px solid var(--bd);border-radius:12px;padding:16px;margin-bottom:12px;animation:fadeUp .3s ease;transition:border-color .2s;}
.rank-card:hover{border-color:var(--bd-b);}
.rank-head{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap;}
.rank-num{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:var(--font-d);font-size:14px;color:#fff;flex-shrink:0;}
.rank-meta{flex:1;min-width:0;}
.rank-label{font-family:var(--font-m);font-size:9px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:2px;opacity:.7;}
.rank-name{font-size:14px;font-weight:700;line-height:1.3;}
.rank-why{font-size:12px;color:var(--text-d);margin-bottom:10px;line-height:1.5;}
.rank-score-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
.score-pill{font-family:var(--font-m);font-size:10px;font-weight:700;padding:3px 8px;border-radius:5px;border:1px solid;}
.source-row{display:flex;gap:6px;flex-wrap:wrap;}
.src-btn{font-family:var(--font-m);font-size:10px;font-weight:700;padding:4px 10px;border-radius:6px;border:1px solid;cursor:pointer;background:transparent;transition:opacity .15s;}
.src-btn:hover{opacity:.75;}
/* SEO */
.seo-section{margin-bottom:20px;}
.seo-section-title{font-family:var(--font-m);font-size:10px;color:var(--acid-d);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;}
.tag-grid{display:flex;flex-wrap:wrap;gap:6px;}
.tag-chip{font-family:var(--font-m);font-size:11px;background:var(--bg-c);border:1px solid var(--bd);color:var(--text-d);padding:4px 10px;border-radius:6px;}
.seo-card{background:var(--bg-c);border:1px solid var(--bd);border-radius:10px;padding:14px;margin-bottom:12px;}
.seo-card-label{font-family:var(--font-m);font-size:9px;color:var(--text-f);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;}
.seo-card-val{font-size:13px;color:var(--text);line-height:1.5;}
/* Intelligence */
.intel-card{background:var(--bg-c);border:1px solid var(--bd);border-radius:10px;padding:14px;margin-bottom:12px;}
.intel-label{font-family:var(--font-m);font-size:9px;color:var(--acid-d);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;}
.intel-val{font-size:13px;color:var(--text-d);line-height:1.5;}
/* Competitor */
.comp-card{background:var(--bg-c);border:1px solid var(--bd);border-radius:10px;padding:14px;margin-bottom:10px;transition:border-color .15s;}
.comp-card:hover{border-color:var(--bd-b);}
.comp-handle{font-family:var(--font-m);font-size:14px;font-weight:700;color:var(--acid);margin-bottom:6px;}
.comp-row{display:flex;gap:10px;margin-bottom:4px;flex-wrap:wrap;}
.comp-label{font-family:var(--font-m);font-size:9px;color:var(--text-f);text-transform:uppercase;letter-spacing:.1em;min-width:70px;padding-top:1px;}
.comp-val{font-size:12px;color:var(--text-d);flex:1;}
/* Settings modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:var(--bg-e);border:1px solid var(--bd-b);border-radius:14px;padding:24px;width:100%;max-width:480px;}
.modal h3{font-family:var(--font-m);font-size:14px;color:var(--acid);margin-bottom:16px;}
.modal label{font-family:var(--font-m);font-size:11px;color:var(--text-d);display:block;margin-bottom:6px;}
.modal input{width:100%;background:var(--bg-c);border:1px solid var(--bd);color:var(--text);font-family:var(--font-m);font-size:12px;padding:10px 12px;border-radius:8px;outline:none;margin-bottom:12px;}
.modal input:focus{border-color:var(--acid-d);}
.modal-hint{font-size:11px;color:var(--text-f);margin-bottom:16px;line-height:1.5;}
.modal-btns{display:flex;justify-content:flex-end;gap:8px;}
.copy-btn{font-family:var(--font-m);font-size:11px;background:var(--bg-c);border:1px solid var(--bd-b);padding:5px 12px;border-radius:20px;cursor:pointer;color:var(--text-d);transition:all .15s;}
.copy-btn:hover{border-color:var(--acid-d);color:var(--acid);}
.copy-btn.copied{border-color:rgba(74,222,128,.4);color:#4ade80;}
/* Empty state */
.empty{text-align:center;padding:50px 20px;color:var(--text-f);}
.empty .glyph{font-size:36px;margin-bottom:10px;}
/* Badges */
.opp-badge{display:inline-flex;align-items:center;gap:5px;font-family:var(--font-m);font-size:10px;font-weight:700;padding:3px 10px;border-radius:5px;}
.opp-high{background:rgba(198,255,61,.1);border:1px solid var(--acid-d);color:var(--acid);}
.opp-med{background:rgba(255,165,0,.1);border:1px solid rgba(255,165,0,.4);color:#FFA500;}
.opp-low{background:rgba(255,90,54,.1);border:1px solid rgba(255,90,54,.35);color:var(--coral);}
/* Divider */
.divider{border:none;border-top:1px solid var(--bd);margin:20px 0;}
@media(max-width:580px){.config-row{grid-template-columns:1fr 1fr;}.config-row .select-wrap:last-child{grid-column:1/-1;}.tab-btn{min-width:60px;font-size:10px;}}
</style>
</head>

<div id="root">
  <div style="text-align:center;padding:60px;font-family:'JetBrains Mono',monospace;color:#5c6169">
    <div style="border:2px solid #262a30;border-top-color:#c6ff3d;border-radius:50%;width:28px;height:28px;animation:spin .8s linear infinite;margin:0 auto 16px"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ─── Constants ─────────────────────────────────────────────────────────────

// ─── API Helper ────────────────────────────────────────────────────────────
async function callWorker(baseUrl, endpoint, payload, timeoutMs = 90000) {
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), timeoutMs);
  try {
    const res = await fetch(`${baseUrl}${endpoint}`, {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify(payload),
      signal: ctrl.signal,
    });
    clearTimeout(timer);
    if (!res.ok) {
      const e = await res.json().catch(()=>({}));
      throw new Error(e.error || `HTTP ${res.status}`);
    }
    return await res.json();
  } catch(err) {
    clearTimeout(timer);
    if (err.name === "AbortError") throw new Error("Request timed out (90s) — try again or check Worker.");
    throw err;
  }
}

// ─── Agent Prompts ─────────────────────────────────────────────────────────

]}
Include exactly 6 ranks from rank 6 down to 1. Each rank escalates intensity. rank 2 = false winner, rank 1 = ultimate payoff.`;

// ─── Main App ──────────────────────────────────────────────────────────────
function App() {
  // ── ALL STATE (fixes black screen — no missing declarations) ──
  const [topic, setTopic]                 = useState("");
  const [creativeBrief, setCreativeBrief] = useState("");
  const [refChannels, setRefChannels]     = useState("");
  const [dateFilter, setDateFilter]       = useState("7 Days");
  const [loading, setLoading]             = useState(false);
  const [error, setError]                 = useState(null);
  const [agentResults, setAgentResults]   = useState({});   // {discovery,ranking,seo,intelligence,competitor}
  const [agentStatus, setAgentStatus]     = useState({ discovery:"idle", ranking:"idle", seo:"idle", intelligence:"idle", competitor:"idle" });
  const [activeProvider, setActiveProvider] = useState("google");
  const [selectedModel, setSelectedModel]   = useState("gemini-1.5-flash-latest");
  const [availableModels, setAvailableModels] = useState(LLM_PROVIDERS.google.models);
  const [activeTab, setActiveTab]         = useState("discovery");
  const [phaseIdx, setPhaseIdx]           = useState(0);    // ← CRITICAL FIX (was missing)
  const [copied, setCopied]               = useState(false); // ← CRITICAL FIX (was missing)
  const [workerUrl, setWorkerUrl]         = useState("https://viral-discovery-proxy.fasterwgseverkh.workers.dev");
  const [showSettings, setShowSettings]   = useState(false);
  const [tempUrl, setTempUrl]             = useState("");
  const [hasResult, setHasResult]         = useState(false);
  const intervalRef = useRef(null);

  const phases = ["Planning strategy…","Scanning YouTube…","Analyzing clips…","Generating insights…","Compiling ranks…","Finalizing report…"];

  // Restore from localStorage on mount
  useEffect(()=>{
    try {
      const saved = localStorage.getItem("viralRadar_v3");
      if (saved) {
        const s = JSON.parse(saved);
        if (s.topic)       setTopic(s.topic);
        if (s.workerUrl)   setWorkerUrl(s.workerUrl);
        if (s.agentResults && Object.keys(s.agentResults).length > 0) {
          setAgentResults(s.agentResults);
          setHasResult(true);
          setAgentStatus({ discovery:"done", ranking:"done", seo:"done", intelligence:"done", competitor:"done" });
        }
      }
    } catch {}
  },[]);

  function saveState(results) {
    try { localStorage.setItem("viralRadar_v3", JSON.stringify({ topic, workerUrl, agentResults: results })); } catch {}
  }

  function setStatus(agent, status) {
    setAgentStatus(prev => ({...prev, [agent]: status}));
  }
  function setResult(agent, data) {
    setAgentResults(prev => {
      const next = {...prev, [agent]: data};
      saveState(next);
      return next;
    });
  }

  function handleProviderChange(e) {
    const name = e.target.value;
    const cfg = LLM_PROVIDERS[name];
    setActiveProvider(name);
    setAvailableModels(cfg.models);
    setSelectedModel(cfg.models[0]?.id || "");
  }

  async function runAgent(agentName, endpoint, payload) {
    setStatus(agentName, "loading");
    try {
      const data = await callWorker(workerUrl, endpoint, payload);
      // Parse text field if needed
      let parsed = data;
      if (data.text && typeof data.text === "string") {
        try { parsed = JSON.parse(data.text); } catch { parsed = data; }
      }
      setResult(agentName, parsed);
      setStatus(agentName, "done");
      return parsed;
    } catch(err) {
      console.error(`[${agentName}] Error:`, err.message);
      setResult(agentName, { error: err.message });
      setStatus(agentName, "error");
      return null;
    }
  }

  async function handleResearch() {
    if (!topic.trim()) return;
    // Reset state
    setLoading(true);
    setError(null);
    setHasResult(false);
    setAgentResults({});
    setAgentStatus({ discovery:"idle", ranking:"idle", seo:"idle", intelligence:"idle", competitor:"idle" });
    setActiveTab("discovery");
    setPhaseIdx(0); // now defined
    setCopied(false); // now defined

    if (intervalRef.current) clearInterval(intervalRef.current);
    intervalRef.current = setInterval(()=>setPhaseIdx(p=>(p+1)%phases.length), 900);

    const channels = refChannels.split("\n").map(c=>c.trim()).filter(Boolean);

    // Agent 1: Discovery (main — YouTube grounded)
    const discoveryData = await runAgent("discovery", "/api/generate", {
      topic: topic.trim(),
      dateFilter,
      provider: activeProvider,
      model: selectedModel,
      referenceChannels: channels,
      styleInstructions: creativeBrief.trim(),
    });

    // Agents 2–5: run in parallel
    const videoTitles = (discoveryData?.real_videos||[]).map(v=>v.title||"").filter(Boolean);
    await Promise.all([
      runAgent("ranking", "/api/complete", {
        prompt: rankingPrompt(topic.trim()),
        provider: activeProvider,
        model: selectedModel,
      }),
      runAgent("seo", "/api/complete", {
        prompt: seoPrompt(topic.trim()),
        provider: activeProvider,
        model: selectedModel,
      }),
      runAgent("intelligence", "/api/complete", {
        prompt: intelligencePrompt(topic.trim(), videoTitles),
        provider: activeProvider,
        model: selectedModel,
      }),
      runAgent("competitor", "/api/complete", {
        prompt: competitorPrompt(topic.trim()),
        provider: activeProvider,
        model: selectedModel,
      }),
    ]);

    clearInterval(intervalRef.current);
    setLoading(false);
    setHasResult(true);
  }

  function handleNewSearch() {
    clearInterval(intervalRef.current);
    setTopic(""); setCreativeBrief(""); setRefChannels("");
    setLoading(false); setError(null); setHasResult(false);
    setAgentResults({});
    setAgentStatus({ discovery:"idle", ranking:"idle", seo:"idle", intelligence:"idle", competitor:"idle" });
    setPhaseIdx(0); setCopied(false);
    localStorage.removeItem("viralRadar_v3");
  }

  function copyResults() {
    const r = agentResults;
    const lines = [`📊 Viral Radar Report: ${topic}\n`];
    if (r.seo?.title_formula) lines.push(`Title Formula: ${r.seo.title_formula}`);
    if (r.seo?.tags) lines.push(`Tags: ${r.seo.tags.join(", ")}`);
    if (r.intelligence?.pattern) lines.push(`\nViral Pattern: ${r.intelligence.pattern}`);
    if (r.intelligence?.content_gaps) lines.push(`Content Gaps: ${r.intelligence.content_gaps.join(", ")}`);
    if (r.ranking?.ranks) {
      lines.push("\n6-Rank Structure:");
      r.ranking.ranks.forEach(rk=>lines.push(`  #${rk.rank} ${rk.label||""}: ${rk.clipName||""} — ${rk.primaryKeyword||""}`));
    }
    navigator.clipboard.writeText(lines.join("\n")).then(()=>{
      setCopied(true);
      setTimeout(()=>setCopied(false), 2200);
    });
  }

  function saveWorkerUrl() {
    if (tempUrl.trim()) setWorkerUrl(tempUrl.trim());
    setShowSettings(false);
  }

  const TABS = [
    { id:"discovery",   label:"Discovery",    icon:"🎬", agentKey:"discovery"    },
    { id:"ranking",     label:"Ranking",      icon:"📊", agentKey:"ranking"      },
    { id:"seo",         label:"SEO",          icon:"🔍", agentKey:"seo"          },
    { id:"intelligence",label:"Intelligence", icon:"🧠", agentKey:"intelligence" },
    { id:"competitor",  label:"Competitor",   icon:"⚔️", agentKey:"competitor"   },
  ];

  function renderTab() {
    const r = agentResults;
    const status = agentStatus[activeTab];
    if (status === "loading") return (
      <div style={{textAlign:"center",padding:"40px",color:"var(--text-f)"}}>
        <div className="spinner" style={{margin:"0 auto 12px",width:24,height:24}}/>
        <div style={{fontFamily:"var(--font-m)",fontSize:12}}>Running agent…</div>
      </div>
    );
    if (r[activeTab]?.error) return (
      <div className="err-box">⚠️ {r[activeTab].error}</div>
    );
    switch(activeTab) {
      case "discovery":    return <DiscoveryTab data={r.discovery} />;
      case "ranking":      return <RankingTab data={r.ranking} />;
      case "seo":          return <SEOTab data={r.seo} />;
      case "intelligence": return <IntelligenceTab data={r.intelligence} />;
      case "competitor":   return <CompetitorTab data={r.competitor} />;
      default:             return null;
    }
  }

  return (
    <div className="shell">

      {/* Settings modal */}
      {showSettings && (
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setShowSettings(false)}>
          <div className="modal">
            <h3>⚙️ Worker URL</h3>
            <label>Cloudflare Worker Base URL</label>
            <input defaultValue={workerUrl} onChange={e=>setTempUrl(e.target.value)}
              placeholder="https://your-worker.workers.dev" onKeyDown={e=>e.key==="Enter"&&saveWorkerUrl()}/>
            <div className="modal-hint">
              Current: <span style={{color:"var(--acid)",wordBreak:"break-all"}}>{workerUrl}</span><br/>
              Make sure CORS is enabled. The worker must have GEMINI_API_KEY or OPENROUTER_API_KEY set.
            </div>
            <div className="modal-btns">
              <button className="btn-sm" onClick={()=>setShowSettings(false)}>Cancel</button>
              <button className="btn-sm" style={{borderColor:"var(--acid-d)",color:"var(--acid)"}} onClick={saveWorkerUrl}>Save</button>
            </div>
          </div>
        </div>
      )}

      {/* Nav */}
      <header className="nav">
        <div className="nav-brand">
          <span className="nav-mark">✦</span>
          Viral Radar
        </div>
        <div className="nav-actions">
          <span className="nav-badge">Source Intelligence Engine</span>
          <button className="btn-sm" onClick={()=>{setTempUrl(workerUrl);setShowSettings(true);}}>⚙️ Worker</button>
        </div>
      </header>

      {/* Hero */}
      <section className="hero">
        <div className="hero-tag"><span className="dot"></span> 5 AI agents · real YouTube grounding · multi-provider fallback</div>
        <h1>Stop guessing<br/>what goes <span>viral.</span></h1>
        <p>Drop a topic. Get real videos, a 6-rank structure, SEO keywords, competitor gaps, and cross-video intelligence — all in one pass.</p>
      </section>

      {/* Console input */}
      <div className="console">
        <div className="console-head">
          <span className="cdot" style={{background:"#ff5f57"}}/>
          <span className="cdot" style={{background:"#febc2e"}}/>
          <span className="cdot" style={{background:"#28c840"}}/>
          <span style={{marginLeft:6}}>research.sh</span>
        </div>
        <div className="console-body">
          {/* Topic input */}
          <div className="console-prompt">
            <span className="c-caret">›</span>
            <input className="c-input" type="text" value={topic}
              onChange={e=>setTopic(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&!loading&&handleResearch()}
              placeholder="e.g. Worst Martial Arts Fails"
              disabled={loading}/>
            {!topic && !loading && <span className="c-cursor"/>}
            <button className="surprise-btn" disabled={loading} title="Surprise me"
              onClick={()=>setTopic(SURPRISE[Math.floor(Math.random()*SURPRISE.length)])}>🎲</button>
          </div>

          {/* Example topics */}
          <div className="example-row">
            {EXAMPLES.map(t=>(
              <button key={t} className={`ex-btn${topic===t?" active":""}`} disabled={loading} onClick={()=>setTopic(t)}>{t}</button>
            ))}
          </div>

          {/* Config row */}
          <div className="config-row">
            <div>
              <div className="field-label">📅 Date Range</div>
              <div className="select-wrap">
                <select value={dateFilter} onChange={e=>setDateFilter(e.target.value)} disabled={loading}>
                  {DATE_FILTERS.map(d=><option key={d} value={d}>{d}</option>)}
                </select>
              </div>
            </div>
            <div>
              <div className="field-label">🤖 AI Provider</div>
              <div className="select-wrap">
                <select value={activeProvider} onChange={handleProviderChange} disabled={loading}>
                  {Object.entries(LLM_PROVIDERS).map(([k,v])=><option key={k} value={k}>{v.name}</option>)}
                </select>
              </div>
            </div>
            <div>
              <div className="field-label">⚙️ Model</div>
              <div className="select-wrap">
                <select value={selectedModel} onChange={e=>setSelectedModel(e.target.value)} disabled={loading}>
                  {availableModels.map(m=><option key={m.id} value={m.id}>{m.name}</option>)}
                </select>
              </div>
            </div>
          </div>

          {/* Creative brief */}
          <div className="expand-row">
            <div className="expand-label">◆ Creative Brief <span className="expand-opt">(optional — describe your content format)</span></div>
            <textarea className="expand-textarea" value={creativeBrief} onChange={e=>setCreativeBrief(e.target.value)}
              disabled={loading} rows={2}
              placeholder="e.g. 6-rank countdown, short clips only (5-20s), strong reaction moments, not compilations…"/>
            <div className="expand-hint">The AI reads this as direct instructions — tells it what "good" looks like for your niche.</div>
          </div>

          {/* Reference channels */}
          <div className="expand-row">
            <div className="expand-label">◆ Style DNA Sources <span className="expand-opt">(optional — paste channel links)</span></div>
            <textarea className="expand-textarea" value={refChannels} onChange={e=>setRefChannels(e.target.value)}
              disabled={loading} rows={2}
              placeholder="youtube.com/@oogway_ranks&#10;youtube.com/@polarranks"/>
            <div className="expand-hint">AI uses these as format/tone reference only — never copies their videos.</div>
          </div>

          {/* Run button */}
          <button className={`run-btn${loading?" loading":""}`}
            onClick={handleResearch} disabled={loading||!topic.trim()}>
            {loading
              ? <><span style={{animation:"spin .8s linear infinite",display:"inline-block"}}>⚡</span>{phases[phaseIdx]}</>
              : "🚀 Run Research — 5 Agents"
            }
          </button>
        </div>
      </div>

      {/* Agent strip */}
      <div className="agent-strip">
        {[
          { name:"DiscoveryAgent",    key:"discovery"     },
          { name:"RankingAgent",      key:"ranking"       },
          { name:"SEOAgent",          key:"seo"           },
          { name:"IntelligenceAgent", key:"intelligence"  },
          { name:"CompetitorAgent",   key:"competitor"    },
        ].map(a=><AgentChip key={a.key} name={a.name} status={agentStatus[a.key]}/>)}
      </div>

      {/* Global error */}
      {error && <div className="err-box">⚠️ {error}</div>}

      {/* Results */}
      {hasResult && (
        <div className="results">
          <div className="results-topbar">
            <div className="results-topic">Results: <span>{topic}</span></div>
            <div style={{display:"flex",gap:8}}>
              <button className={`copy-btn${copied?" copied":""}`} onClick={copyResults}>
                {copied?"✔ Copied":"📋 Copy Report"}
              </button>
              <button className="btn-sm" onClick={handleNewSearch}>New Search</button>
            </div>
          </div>

          {/* Tab bar */}
          <div className="tab-bar">
            {TABS.map(t=>{
              const st = agentStatus[t.agentKey];
              const hasErr = agentResults[t.agentKey]?.error;
              return (
                <button key={t.id} className={`tab-btn${activeTab===t.id?" active":""}${hasErr?" has-error":""}`}
                  onClick={()=>setActiveTab(t.id)}>
                  {t.icon}&nbsp;{t.label}
                  {st==="loading" && <span style={{width:6,height:6,borderRadius:"50%",background:"var(--acid)",animation:"pulse .8s infinite",display:"inline-block"}}/>}
                  {st==="done" && !hasErr && <span style={{color:"#4ade80",fontSize:8}}>●</span>}
                  {hasErr && <span style={{color:"var(--coral)",fontSize:8}}>●</span>}
                </button>
              );
            })}
          </div>

          {/* Tab content */}
          {renderTab()}
        </div>
      )}

      {!hasResult && !loading && (
        <div className="empty" style={{marginTop:40}}>
          <div className="glyph">🚀</div>
          <div style={{fontSize:16,marginBottom:8}}>Enter a topic above to start</div>
          <div style={{fontSize:13}}>5 AI agents will run in parallel and give you real results</div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
