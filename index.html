<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

const WORKER_URL = "https://viral-discovery-proxy.fasterwgseverkh.workers.dev";

const SURPRISE_NICHES = [

  { rank: 2, label: "FALSE PAYOFF", color: "#CC00FF", glow: "rgba(204,0,255,0.45)", bar: 95 },
  { rank: 1, label: "ULTIMATE PAYOFF", color: "#FF0050", glow: "rgba(255,0,80,0.6)", bar: 100 },
];

function RetentionCurve() {
  return React.createElement("div", { className: "retention-curve-wrapper" },
    React.createElement("div", { className: "retention-curve-label" }, "Retention"),
    [...RANK_META].reverse().map(function(m) {
      return React.createElement("div", { key: m.rank, className: "retention-rank-item" },
        React.createElement("span", { className: "retention-percent", style: { color: m.color } }, m.bar + "%"),
        React.createElement("div", { className: "retention-bar-inner", style: {
          height: (m.bar * 0.5) + "px",
          background: "linear-gradient(180deg," + m.color + ",rgba(255,255,255,0.03))",
          boxShadow: "0 -3px 10px " + m.glow
        }}),
        React.createElement("span", { className: "retention-rank-label" }, "#" + m.rank)
      );
    })
  );
}

function App() {
  const [topic, setTopic] = useState("");
  const [creativeBrief, setCreativeBrief] = useState("");
  const [refChannels, setRefChannels] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [result, setResult] = useState(null);
  const [phaseIdx, setPhaseIdx] = useState(0);
  const [copied, setCopied] = useState(false);
  const intervalRef = useRef(null);
  const phases = ["Planning research…", "Analyzing style DNA…", "Hunting for clips…", "Analyzing evidence…", "Generating insights…"];

  useEffect(() => { return () => { if (intervalRef.current) clearInterval(intervalRef.current); }; }, []);

  function handleSurprise() {
    const pick = SURPRISE_NICHES[Math.floor(Math.random() * SURPRISE_NICHES.length)];
    setTopic(pick);
    setCreativeBrief("Find real, shocking, funny fail clips — original short moments, not compilations. One clear event per clip. Strong reaction. Suitable for #6 to #1 ranking format like PolarRanks.");
    setRefChannels("youtube.com/@oogway_ranks\nyoutube.com/@polarranks");
  }

  async function handleResearch() {
    if (!topic.trim()) { setError("Enter a topic first."); return; }
    setLoading(true); setError(null); setResult(null); setCopied(false); setPhaseIdx(0);
    if (intervalRef.current) clearInterval(intervalRef.current);
    intervalRef.current = setInterval(() => setPhaseIdx(p => (p + 1) % phases.length), 1200);
    try {
      const resp = await fetch(WORKER_URL + "/api/generate-insights", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          topic: topic.trim(),
          creativeBrief: creativeBrief.trim(),
          referenceChannels: refChannels.split("\n").map(c => c.trim()).filter(Boolean),
        })
      });
      const data = await resp.json();
      if (!resp.ok) throw new Error(data.error || "Worker error " + resp.status);
      setResult(data);
    } catch (e) { setError(e.message || "Unknown error"); }
    finally { if (intervalRef.current) clearInterval(intervalRef.current); setLoading(false); setPhaseIdx(0); }
  }

  function handleNewSearch() { setResult(null); setError(null); setTopic(""); setCreativeBrief(""); setRefChannels(""); }

  function copyResult() {
    if (!result) return;
    const ins = result.ai_actionable_insights;
    let ct = "Source Intelligence Report: " + (result.editorial_objective?.topic || "") + "\n\n";
    if (ins?.hook_suggestions?.length) ct += "Hooks: " + ins.hook_suggestions.join(", ") + "\n";
    if (ins?.hashtag_strategy?.length) ct += "Hashtags: " + ins.hashtag_strategy.join(", ") + "\n";
    if (ins?.ranked_clip_opportunities?.length) {
      ct += "\nRanked Clips:\n";
      ins.ranked_clip_opportunities.forEach(c => { ct += "#" + (c.rank||"?") + ": " + c.moment_idea + " — " + (c.youtube_url||"") + "\n"; });
    }
    navigator.clipboard.writeText(ct).then(() => { setCopied(true); setTimeout(() => setCopied(false), 2000); });
  }

  const hasResult = !!result;
  const pipeline = result?.pipeline;
  const evidence = result?.raw_evidence_found;
  const insights = result?.ai_actionable_insights;
  const hasEvidence = evidence && evidence.total_youtube > 0;

  return React.createElement("div", { className: "shell" },
    React.createElement("div", { className: "nav" },
      React.createElement("div", { className: "nav-brand" },
        React.createElement("span", { className: "nav-mark" }, "✦"),
        React.createElement("span", { className: "nav-name" }, "Viral Radar")
      ),
      React.createElement("span", { className: "nav-badge" }, "Source Intelligence Engine")
    ),
    React.createElement("div", { className: "hero" },
      React.createElement("div", { className: "hero-tag" },
        React.createElement("span", { className: "dot" }), " AI-powered Viral Clip Discovery"
      ),
      React.createElement("h1", null, "Uncover the ", React.createElement("span", null, "Original"), React.createElement("br"), "Viral Moments."),
      React.createElement("p", null, "Find real source clips for your ranking videos. Like PolarRanks — funny, shocking, unexpected moments that make people laugh.")
    ),
    RetentionCurve(),
    React.createElement("div", { className: "console" },
      React.createElement("div", { className: "console-head" },
        React.createElement("span", { className: "cdot", style: { background: "#ff5f57" } }),
        React.createElement("span", { className: "cdot", style: { background: "#febc2e" } }),
        React.createElement("span", { className: "cdot", style: { background: "#28c840" } }),
        React.createElement("span", { style: { marginLeft: "6px" } }, "research.sh")
      ),
      React.createElement("div", { className: "console-body" },
        React.createElement("div", { className: "console-prompt" },
          React.createElement("span", { className: "caret" }, "›"),
          React.createElement("input", {
            type: "text", value: topic, onChange: e => setTopic(e.target.value),
            onKeyDown: e => { if (e.key === "Enter" && !loading) handleResearch(); },
            placeholder: "e.g. worst martial arts fails", disabled: loading,
            style: { flex: 1, background: "transparent", border: "none", outline: "none", color: "var(--text)", fontFamily: "var(--font-mono)", fontSize: "15px" }
          }),
          React.createElement("button", { className: "surprise-btn", onClick: handleSurprise, disabled: loading, title: "Surprise niche" }, "🎲")
        ),
        React.createElement("div", { className: "ref-block" },
          React.createElement("div", { className: "ref-label" }, "◆ Creative Brief"),
          React.createElement("textarea", {
            className: "ref-input", value: creativeBrief, onChange: e => setCreativeBrief(e.target.value),
            placeholder: "e.g. Find real, shocking fail clips — original, short, one clear event, strong reaction, not compilations.",
            disabled: loading, rows: 2
          })
        ),
        React.createElement("div", { className: "ref-block" },
          React.createElement("div", { className: "ref-label" }, "◆ Style DNA Sources (YouTube channels)"),
          React.createElement("textarea", {
            className: "ref-input", value: refChannels, onChange: e => setRefChannels(e.target.value),
            placeholder: "youtube.com/@oogway_ranks\nyoutube.com/@polarranks",
            disabled: loading, rows: 2
          }),
          React.createElement("div", { className: "ref-hint" }, "We'll analyze these channels' recent videos to detect patterns: clip length, format, content style.")
        ),
        React.createElement("button", { className: "run-btn", onClick: handleResearch, disabled: loading || !topic.trim() },
          loading
            ? React.createElement("span", { style: { display: "flex", alignItems: "center", gap: 8 } },
                React.createElement("span", { style: { animation: "spin 0.8s linear infinite", display: "inline-block" } }, "⚡"), phases[phaseIdx])
            : "🚀 Get Source Intelligence"
        )
      )
    ),
    React.createElement("div", { className: "agent-strip" },
      React.createElement("span", { className: "agent-chip" }, "ResearchPlanner"),
      React.createElement("span", { className: "agent-chip" }, "StyleDNA"),
      React.createElement("span", { className: "agent-chip" }, "SourceHunter"),
      React.createElement("span", { className: "agent-chip" }, "InsightsGenerator")
    ),
    error && React.createElement("div", { className: "error-box" }, "⚠️ " + error),
    loading && React.createElement("div", { className: "loading-box" },
      React.createElement("div", { className: "spinner", style: { margin: "0 auto" } }),
      React.createElement("p", null, "Searching for real video clips…")
    ),
    pipeline && React.createElement("div", { className: "pipeline" },
      Object.keys(pipeline).map(key => {
        const s = pipeline[key];
        const icon = s.status === "completed" ? "✔" : s.status === "failed" ? "✕" : s.status === "running" ? "→" : "—";
        return React.createElement("div", { key, className: "pipeline-step " + s.status },
          React.createElement("div", { className: "pipeline-icon " + s.status }, icon),
          React.createElement("div", { className: "pipeline-info" },
            React.createElement("div", { className: "pipeline-label" }, s.label),
            React.createElement("div", { className: "pipeline-msg" }, s.message || "...")
          )
        );
      })
    ),
    hasResult && !loading && React.createElement("div", { className: "results" },
      React.createElement("div", { className: "results-topbar" },
        React.createElement("span", null),
        React.createElement("button", { className: "new-search-btn", onClick: handleNewSearch }, "New Research")
      ),
      !hasEvidence && React.createElement("div", { className: "section-card", style: { borderColor: "var(--coral-dim)" } },
        React.createElement("div", { className: "section-title", style: { color: "var(--coral)" } }, "⚠️ No Source Evidence Found"),
        React.createElement("p", { style: { fontSize: "13px", color: "var(--text-dim)", lineHeight: 1.5 } },
          result.error || "Source Hunter could not find any real video clips. Ensure YOUTUBE_API_KEY is set in Worker settings."
        )
      ),
      result.ref_channel_analysis && result.ref_channel_analysis.channels_analyzed?.length > 0 &&
        React.createElement("div", { className: "section-card" },
          React.createElement("div", { className: "section-title" }, "🧬 Editorial DNA Extracted"),
          result.ref_channel_analysis.detected_patterns?.map((p, i) =>
            React.createElement("div", { key: i, style: { fontSize: "13px", color: "var(--text)", marginBottom: "6px" } }, "✓ " + p)
          ),
          React.createElement("div", { style: { marginTop: "10px" } },
            React.createElement("div", { className: "insights-label" }, "Clip Length"),
            React.createElement("div", { className: "insights-value" }, result.ref_channel_analysis.clip_length)
          )
        ),
      hasEvidence && React.createElement("div", { className: "section-card" },
        React.createElement("div", { className: "section-title" }, "📹 YouTube Clips Found (" + evidence.total_youtube + ")"),
        evidence.youtube_clips.slice(0, 20).map((clip, i) =>
          React.createElement("div", { key: i, className: "evidence-item" },
            clip.thumbnail ? React.createElement("img", { src: clip.thumbnail, alt: "", className: "evidence-thumb" })
              : React.createElement("div", { className: "evidence-thumb" }),
            React.createElement("div", { className: "evidence-info" },
              React.createElement("a", { href: clip.url, target: "_blank", rel: "noopener noreferrer", className: "evidence-title" }, clip.title),
              React.createElement("div", { className: "evidence-meta" },
                React.createElement("span", { className: "views" }, clip.views.toLocaleString() + " views"),
                " · " + clip.channel + " · " + new Date(clip.published_at).toLocaleDateString()
              )
            )
          )
        )
      ),
      hasEvidence && React.createElement("div", { className: "section-card" },
        React.createElement("div", { className: "section-title" }, "🔍 Search Other Platforms"),
        React.createElement("p", { style: { fontSize: "11px", color: "var(--text-faint)", marginBottom: "10px" } }, "Click to search for clips on these platforms:"),
        evidence.platform_search_links && Object.keys(evidence.platform_search_links).map(key => {
          const link = evidence.platform_search_links[key];
          return React.createElement("a", { key, href: link.url, target: "_blank", rel: "noopener noreferrer", className: "platform-link" }, link.platform + " ↗");
        })
      ),
      insights && insights.ranked_clip_opportunities?.length > 0 && React.createElement("div", { className: "section-card" },
        React.createElement("div", { className: "section-title" }, "🎯 Ranked Clip Opportunities"),
        React.createElement("button", { onClick: copyResult, className: "tag-chip", style: { marginBottom: "12px", cursor: "pointer" } }, copied ? "✔ Copied" : "📋 Copy Results"),
        insights.ranked_clip_opportunities.map((clip, i) => {
          const color = RANK_META.find(r => r.rank === clip.rank)?.color || "#FF6B35";
          return React.createElement("div", { key: i, className: "rank-card", style: { borderLeft: "3px solid " + color } },
            React.createElement("div", { className: "rank-badge", style: { background: color + "20", color } }, "RANK #" + (clip.rank || (6 - i))),
            React.createElement("div", { className: "rank-idea" }, clip.moment_idea),
            React.createElement("div", { className: "rank-meta" }, "Platform: " + (clip.suggested_source_platform || "YouTube") + " · Views: " + ((clip.views || 0).toLocaleString())),
            clip.youtube_url && React.createElement("a", { href: clip.youtube_url, target: "_blank", rel: "noopener noreferrer", className: "rank-link" }, "Watch clip ↗"),
            clip.why_interesting && React.createElement("div", { className: "rank-meta", style: { marginTop: "4px" } }, clip.why_interesting)
          );
        })
      ),
      insights && insights.hook_suggestions?.length > 0 && React.createElement("div", { className: "section-card" },
        React.createElement("div", { className: "section-title" }, "⚡ Hook Suggestions"),
        React.createElement("div", { className: "tag-grid" }, insights.hook_suggestions.map((h, i) => React.createElement("span", { key: i, className: "tag-chip" }, h)))
      ),
      insights && insights.hashtag_strategy?.length > 0 && React.createElement("div", { className: "section-card" },
        React.createElement("div", { className: "section-title" }, "# Hashtag Strategy"),
        React.createElement("div", { className: "tag-grid" }, insights.hashtag_strategy.map((h, i) => React.createElement("span", { key: i, className: "tag-chip" }, "#" + h)))
      ),
      insights && insights.key_search_phrases_for_discoverability?.length > 0 && React.createElement("div", { className: "section-card" },
        React.createElement("div", { className: "section-title" }, "🔍 Discoverability Phrases"),
        React.createElement("div", { className: "tag-grid" }, insights.key_search_phrases_for_discoverability.map((p, i) => React.createElement("span", { key: i, className: "tag-chip" }, p)))
      )
    ),
    !hasResult && !loading && !error && React.createElement("div", { className: "text-center", style: { padding: "55px 20px", color: "rgba(240,240,245,0.16)" } },
      React.createElement("div", { style: { fontSize: "42px", marginBottom: "9px" } }, "🚀"),
      React.createElement("div", { style: { fontSize: "18px" } }, "Start your Source Intelligence Research!"),
      React.createElement("p", { style: { marginTop: "10px", fontSize: "13px" } }, "Enter a topic like 'worst martial arts fails' to find real video clips.")
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
