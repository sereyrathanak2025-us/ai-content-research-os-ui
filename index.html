        .hero { padding: 20px 0 44px; text-align: center; }

        .loading-box { margin-top: 40px; text-align: center; padding: 40px 0; }

        .rank-display { display: flex; align-items: center; gap: 10px; }
        .rank-circle { border-radius: 8px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-size: 14px; font-weight: 700; color: #0a0b0d; flex-shrink: 0; }
        .rank-text-label { font-family: var(--font-mono); font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 2px; }
        .rank-text-name { font-size: 13.5px; font-weight: 700; }
        .card-tags { display: flex; gap: 6px; flex-wrap: wrap; }
        .card-tag { border-radius: 6px; padding: 3px 9px; font-family: var(--font-mono); font-size: 9.5px; font-weight: 700; border: 1px solid; }
        .why-box { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 9px; padding: 11px 13px; margin-bottom: 14px; font-size: 13px; color: var(--text-dim); line-height: 1.55; }
        .score-row-mini { display: flex; gap: 9px; flex-wrap: wrap; margin-bottom: 14px; }
        .score-item { flex: 1; min-width: 120px; background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 9px; padding: 9px 11px; }
        .score-item-label { font-family: var(--font-mono); font-size: 9px; font-weight: 700; color: var(--text-faint); text-transform: uppercase; margin-bottom: 6px; }
        .score-item-bar { display: flex; align-items: center; gap: 8px; }
        .score-item-val { font-family: var(--font-mono); font-size: 12px; font-weight: 700; width: 24px; flex-shrink: 0; }
        .score-track { height: 5px; flex: 1; background: var(--bg); border-radius: 3px; overflow: hidden; border: 1px solid var(--border); }
        .score-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }
        .empty-panel { background: var(--bg-card); border: 1px dashed var(--border-bright); border-radius: 10px; padding: 16px; font-size: 13px; color: var(--text-faint); font-family: var(--font-mono); }

        @media (max-width: 560px) {
            .config-row { grid-template-columns: 1fr; }
            .evidence-thumb { width: 76px; height: 48px; }
        }
    </style>
</head>

    <script>

        // ============================================================
        const WORKER_BASE_URL = "https://viral-discovery-proxy.fasterwgseverkh.workers.dev";
        const STORAGE_KEY = 'viralRadarState_v3';

        const PROVIDERS_CONFIG = {

            ]},
        };

        const RANK_META = [
            { rank: 6, label: "HOOK", color: "#ff6b35" },
            { rank: 5, label: "INTEREST", color: "#f7931e" },
            { rank: 4, label: "CONTEXT", color: "#ffd166" },

            { rank: 2, label: "FALSE WINNER", color: "#cc66ff" },
            { rank: 1, label: "PAYOFF", color: "#c6ff3d" },
        ];

        const RARITY_COLOR = { Common: "#888", Uncommon: "#4CAF50", Rare: "#2196F3", "Very Rare": "#CC66FF", Legendary: "#FF0050" };
        const COMP_COLOR = { Low: "#4CAF50", Medium: "#FFD166", High: "#FF4444" };
        const TREND_COLOR = { Rising: "#4CAF50", Stable: "#FFD166", Declining: "#FF4444", Exploding: "#c6ff3d" };

        const SURPRISE_NICHES = [
            "ranking the worst martial arts fails", "don't check the sound moments", "ranking funniest chicken scream moments",
            "instant regret prank fails", "optical illusion moments that break your brain", "gym fails that hurt to watch",
            "ranking the most unexpected plot twists caught on camera", "wait for it fail moments", "fake wave prank reactions",
            "perfect timing coincidences caught on camera", "things that shouldn't have worked but did", "ranking worst decisions caught on camera",
            "ranking animals ruining everything", "don't trust your eyes illusions", "public prank reactions gone wrong",
            "ranking the most savage comebacks caught on camera", "near miss moments that will make you gasp",
            "ranking the funniest scream reactions", "instant karma caught on camera", "things that look fake but are 100% real",
        ];

        // Cross-platform quick-search — pure URL construction, no scraping.
        // Real, clickable links that open native search results for a term.
        const PLATFORM_CFG = {
            youtube: { name: "YouTube", icon: "▶", color: "#FF0000", searchUrl: (q) => `https://www.youtube.com/results?search_query=${encodeURIComponent(q)}` },
            tiktok: { name: "TikTok", icon: "♬", color: "#00F2EA", searchUrl: (q) => `https://www.tiktok.com/search?q=${encodeURIComponent(q)}` },
            reddit: { name: "Reddit", icon: "●", color: "#FF4500", searchUrl: (q) => `https://www.reddit.com/search/?q=${encodeURIComponent(q)}&sort=top` },
            instagram: { name: "Instagram", icon: "📸", color: "#E1306C", searchUrl: (q) => `https://www.instagram.com/explore/tags/${encodeURIComponent(q.replace(/\s+/g, ''))}` },
        };

        // ============================================================
        // HELPERS
        // ============================================================
        async function callWorkerAPI(endpoint, payload) {
            const controller = new AbortController();
            const timeout = 120000;
            const timer = setTimeout(() => controller.abort(), timeout);
            try {
                const response = await fetch(`${WORKER_BASE_URL}${endpoint}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload), signal: controller.signal,
                });
                clearTimeout(timer);
                const data = await response.json();
                if (!response.ok) throw new Error(data.error || `Worker request failed with status ${response.status}`);
                return data;
            } catch (error) {
                clearTimeout(timer);
                if (error.name === 'AbortError') throw new Error(`Request timed out after ${timeout / 1000}s.`);
                throw error;
            }
        }

        function extractYouTubeId(url) {
            if (!url) return null;
            const m = url.match(/(?:youtu\.be\/|v=|shorts\/)([a-zA-Z0-9_-]{6,})/);
            return m ? m[1] : null;
        }
        function formatViews(n) {
            if (!n) return null;
            if (n >= 1000000) return (n / 1000000).toFixed(1).replace(/\.0$/, '') + 'M';
            if (n >= 1000) return (n / 1000).toFixed(1).replace(/\.0$/, '') + 'K';
            return String(n);
        }
        function parseReferenceChannels(raw) {
            if (!raw || !raw.trim()) return [];
            return raw.split(/[\n,]/).map(s => s.trim()).filter(Boolean)
                .map(s => { const m = s.match(/@([\w.-]+)/); return m ? '@' + m[1] : (s.startsWith('@') ? s : '@' + s); })
                .filter((v, i, arr) => arr.indexOf(v) === i).slice(0, 5);
        }
        function el(tag, className, html) {
            const e = document.createElement(tag);
            if (className) e.className = className;
            if (html !== undefined) e.innerHTML = html;
            return e;
        }
        function escapeHtml(str) {
            const d = document.createElement('div');
            d.textContent = str == null ? '' : String(str);
            return d.innerHTML;
        }
        function platformBtn(platform, label, url) {
            const c = PLATFORM_CFG[platform];
            const a = document.createElement('a');
            a.className = 'platform-btn';
            a.href = url; a.target = '_blank'; a.rel = 'noopener noreferrer';
            a.style.background = c.color + '15'; a.style.borderColor = c.color + '40'; a.style.color = c.color;
            a.innerHTML = `${c.icon} ${escapeHtml(label)}`;
            return a;
        }

        // ============================================================
        // STATE
        // ============================================================
        const appState = {
            topic: '', platform: 'YouTube', referenceChannels: '', styleInstructions: '',
            activeProvider: 'google', selectedModel: PROVIDERS_CONFIG.google.models[0].id,
            loading: false, error: null, researchData: null, restored: false,
            activeRank: 6, copied: false, activeView: 'insights',
        };

        function updateState(patch) { Object.assign(appState, patch); renderApp(); persistState(); }
        function persistState() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify({
                    topic: appState.topic, platform: appState.platform, referenceChannels: appState.referenceChannels,
                    styleInstructions: appState.styleInstructions, activeProvider: appState.activeProvider,
                    selectedModel: appState.selectedModel, researchData: appState.researchData, activeRank: appState.activeRank,
                }));
            } catch (e) { /* private mode / quota — ignore */ }
        }
        function restoreState() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (!saved) return;
                const parsed = JSON.parse(saved);
                Object.assign(appState, parsed);
                if (parsed.researchData) appState.restored = true;
            } catch (e) { /* corrupted/unavailable storage */ }
        }

        // ============================================================
        // RENDER
        // ============================================================
        function renderApp() {
            const root = document.getElementById('root');
            root.innerHTML = '';
            const shell = el('div', 'shell');

            shell.appendChild(el('div', 'nav', `<div class="nav-brand"><span class="nav-mark">✦</span><span class="nav-name">Viral Radar</span></div><span class="nav-badge">FREE · NO SIGNUP</span>`));
            shell.appendChild(el('div', 'hero', `<div class="hero-tag"><span class="dot"></span> real YouTube grounding, no fabricated data</div><h1>Stop guessing<br />what goes <span>viral</span>.</h1><p>Drop in an idea. Get real short-form videos, a 6-beat ranked structure, and SEO — in one pass.</p>`));

            shell.appendChild(renderConsole());

            const strip = el('div', 'agent-strip');
            ['Discovery', 'Ranking', 'SEO'].forEach(a => strip.appendChild(el('span', 'agent-chip', `${a}Agent`)));
            shell.appendChild(strip);

            if (appState.error) shell.appendChild(el('div', 'error-box', `⚠ ${escapeHtml(appState.error)}`));
            if (appState.loading) shell.appendChild(el('div', 'loading-box', `<div class="spinner" style="margin:0 auto;"></div><p>running research · up to 2 min on cold providers</p>`));
            if (appState.researchData && !appState.loading) shell.appendChild(renderResults(appState.researchData));

            root.appendChild(shell);
        }

        function renderConsole() {
            const consoleDiv = el('div', 'console');
            consoleDiv.appendChild(el('div', 'console-head', `<span style="background:#ff5f57;width:8px;height:8px;border-radius:50%;display:inline-block;"></span><span style="background:#febc2e;width:8px;height:8px;border-radius:50%;display:inline-block;"></span><span style="background:#28c840;width:8px;height:8px;border-radius:50%;display:inline-block;"></span><span style="margin-left:6px;">research.sh</span>`));
            const body = el('div', 'console-body');

            const promptRow = el('div', 'console-prompt');
            promptRow.appendChild(el('span', 'caret', '›'));
            const topicInput = document.createElement('input');
            topicInput.type = 'text';
            topicInput.placeholder = 'e.g. ranking the worst martial arts fails';
            topicInput.value = appState.topic;
            topicInput.disabled = appState.loading;
            topicInput.addEventListener('input', (e) => { appState.topic = e.target.value; });
            topicInput.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !appState.loading) handleResearch(); });
            promptRow.appendChild(topicInput);
            if (!appState.topic && !appState.loading) promptRow.appendChild(el('span', 'console-cursor'));
            const surpriseBtn = document.createElement('button');
            surpriseBtn.type = 'button'; surpriseBtn.className = 'surprise-btn'; surpriseBtn.title = 'Suggest a niche'; surpriseBtn.textContent = '🎲';
            surpriseBtn.disabled = appState.loading;
            surpriseBtn.addEventListener('click', () => updateState({ topic: SURPRISE_NICHES[Math.floor(Math.random() * SURPRISE_NICHES.length)] }));
            promptRow.appendChild(surpriseBtn);
            body.appendChild(promptRow);

            const configRow = el('div', 'config-row');
            const platformSel = document.createElement('select');
            platformSel.disabled = appState.loading;
            ['YouTube', 'TikTok', 'Instagram', 'Twitter', 'LinkedIn'].forEach(p => {
                const o = document.createElement('option'); o.value = p; o.textContent = p; if (p === appState.platform) o.selected = true;
                platformSel.appendChild(o);
            });
            platformSel.addEventListener('change', (e) => { appState.platform = e.target.value; });
            const platformWrap = el('div', 'select-wrap');
            platformWrap.appendChild(platformSel);
            configRow.appendChild(platformWrap);

            const providerSel = document.createElement('select');
            providerSel.disabled = appState.loading;
            Object.entries(PROVIDERS_CONFIG).forEach(([key, cfg]) => {
                const o = document.createElement('option'); o.value = key; o.textContent = cfg.name; if (key === appState.activeProvider) o.selected = true;
                providerSel.appendChild(o);
            });
            providerSel.addEventListener('change', (e) => updateState({ activeProvider: e.target.value, selectedModel: PROVIDERS_CONFIG[e.target.value].models[0].id }));
            const providerWrap = el('div', 'select-wrap'); providerWrap.appendChild(providerSel);
            configRow.appendChild(providerWrap);

            const modelSel = document.createElement('select');
            modelSel.disabled = appState.loading;
            (PROVIDERS_CONFIG[appState.activeProvider]?.models || []).forEach(m => {
                const o = document.createElement('option'); o.value = m.id; o.textContent = m.name; if (m.id === appState.selectedModel) o.selected = true;
                modelSel.appendChild(o);
            });
            modelSel.addEventListener('change', (e) => { appState.selectedModel = e.target.value; });
            const modelWrap = el('div', 'select-wrap'); modelWrap.appendChild(modelSel);
            configRow.appendChild(modelWrap);

            body.appendChild(configRow);

            const briefBlock = el('div', 'ref-block');
            briefBlock.appendChild(el('div', 'ref-label', '◆ Creative brief <span class="ref-optional">(optional — describe the exact format you want)</span>'));
            const briefInput = document.createElement('textarea');
            briefInput.className = 'ref-input'; briefInput.rows = 2; briefInput.disabled = appState.loading;
            briefInput.placeholder = "e.g. ranked #6→#1 countdown of real, shocking/funny moments pulled from original short clips — not a compilation reel, high-energy editing, one clear 'moment' per rank";
            briefInput.value = appState.styleInstructions;
            briefInput.addEventListener('input', (e) => { appState.styleInstructions = e.target.value; });
            briefBlock.appendChild(briefInput);
            briefBlock.appendChild(el('div', 'ref-hint', 'This is read as direct instructions, not just a search topic — it tells the AI what "good" looks like for your niche.'));
            body.appendChild(briefBlock);

            const refBlock = el('div', 'ref-block');
            refBlock.appendChild(el('div', 'ref-label', '◆ Reference channels <span class="ref-optional">(optional — teach the style you want)</span>'));
            const refInput = document.createElement('textarea');
            refInput.className = 'ref-input'; refInput.rows = 2; refInput.disabled = appState.loading;
            refInput.placeholder = 'youtube.com/@oogway_ranks\nyoutube.com/@polarranks\nyoutube.com/@mrpurifiedwater';
            refInput.value = appState.referenceChannels;
            refInput.addEventListener('input', (e) => { appState.referenceChannels = e.target.value; });
            refBlock.appendChild(refInput);
            refBlock.appendChild(el('div', 'ref-hint', "Paste channel links whose ranked-moment style you want to match. The AI won't copy their videos — it uses them as a format/tone reference while still grounding results in fresh, real videos."));
            body.appendChild(refBlock);

            const runBtn = document.createElement('button');
            runBtn.className = 'run-btn'; runBtn.disabled = appState.loading;
            runBtn.textContent = appState.loading ? 'Scanning…' : 'Run Research →';
            runBtn.addEventListener('click', handleResearch);
            body.appendChild(runBtn);

            consoleDiv.appendChild(body);
            return consoleDiv;
        }

        function renderResults(data) {
            const wrap = el('div', 'results');

            const topbar = el('div', 'results-topbar');
            topbar.appendChild(appState.restored ? el('span', 'restored-tag', '↺ restored from your last visit') : el('span'));
            const btnRow = el('div'); btnRow.style.display = 'flex'; btnRow.style.gap = '8px';
            const copyBtn = document.createElement('button');
            copyBtn.className = 'copy-btn' + (appState.copied ? ' copied' : '');
            copyBtn.textContent = appState.copied ? '✓ Copied' : '📋 Copy results';
            copyBtn.addEventListener('click', () => copyResults(data));
            const newSearchBtn = document.createElement('button');
            newSearchBtn.className = 'new-search-btn'; newSearchBtn.textContent = 'New search';
            newSearchBtn.addEventListener('click', handleNewSearch);
            btnRow.appendChild(copyBtn); btnRow.appendChild(newSearchBtn);
            topbar.appendChild(btnRow);
            wrap.appendChild(topbar);

            const summary = el('div', 'result-summary-box');
            summary.appendChild(el('div', 'result-summary-topic', escapeHtml(data.topic || appState.topic)));
            if (data.overall_opportunity_reasoning) summary.appendChild(el('div', 'result-summary-reasoning', escapeHtml(data.overall_opportunity_reasoning)));
            wrap.appendChild(summary);

            const selector = el('div', 'view-mode-selector');
            [['insights', '✨ Ranked Structure'], ['evidence', '📚 Real Videos'], ['sources', '🔎 Cross-Platform Search']].forEach(([id, label]) => {
                const btn = document.createElement('button');
                btn.className = 'view-mode-btn' + (appState.activeView === id ? ' active' : '');
                btn.textContent = label;
                btn.addEventListener('click', () => updateState({ activeView: id }));
                selector.appendChild(btn);
            });
            wrap.appendChild(selector);

            if (appState.activeView === 'insights') wrap.appendChild(renderInsightsView(data));
            else if (appState.activeView === 'evidence') wrap.appendChild(renderEvidenceView(data));
            else wrap.appendChild(renderSourcesView(data));

            return wrap;
        }

        function renderInsightsView(data) {
            const wrap = el('div');
            const ranks = Array.isArray(data.ranks) ? data.ranks : [];

            if (ranks.length === 0) {
                wrap.appendChild(el('div', 'empty-panel', 'No ranked structure generated.'));
                return wrap;
            }

            const selector = el('div', 'rank-selector');
            [6, 5, 4, 3, 2, 1].forEach(rankNum => {
                const meta = RANK_META.find(m => m.rank === rankNum);
                const btn = document.createElement('button');
                btn.className = 'rank-btn' + (appState.activeRank === rankNum ? ' active' : '');
                btn.textContent = `#${rankNum}`;
                if (appState.activeRank === rankNum) btn.style.background = meta.color;
                btn.addEventListener('click', () => updateState({ activeRank: rankNum }));
                selector.appendChild(btn);
            });
            wrap.appendChild(selector);

            const activeData = ranks.find(r => Number(r.rank) === appState.activeRank);
            const meta = RANK_META.find(m => m.rank === appState.activeRank);
            if (!activeData || !meta) { wrap.appendChild(el('div', 'empty-panel', 'No data for this rank.')); return wrap; }

            const card = el('div', 'insights-card');
            const header = el('div', 'card-header');
            const rd = el('div', 'rank-display');
            const circle = el('div', 'rank-circle', `#${meta.rank}`); circle.style.background = meta.color;
            rd.appendChild(circle);
            const tw = el('div');
            const lbl = el('div', 'rank-text-label', meta.label); lbl.style.color = meta.color;
            tw.appendChild(lbl); tw.appendChild(el('div', 'rank-text-name', escapeHtml(activeData.clipName || '')));
            rd.appendChild(tw); header.appendChild(rd);

            const tags = el('div', 'card-tags');
            const addTag = (text, color) => { const t = el('span', 'card-tag', text); t.style.background = color + '18'; t.style.borderColor = color + '55'; t.style.color = color; tags.appendChild(t); };
            if (activeData.rarity) addTag(`💎 ${escapeHtml(activeData.rarity)}`, RARITY_COLOR[activeData.rarity] || '#888');
            if (activeData.competition) addTag(`${escapeHtml(activeData.competition)} comp.`, COMP_COLOR[activeData.competition] || '#888');
            if (activeData.trendDirection) addTag(`📈 ${escapeHtml(activeData.trendDirection)}`, TREND_COLOR[activeData.trendDirection] || '#888');
            if (activeData.viralScore?.final !== undefined) { const t = el('span', 'card-tag', `🔥 ${activeData.viralScore.final}/100`); t.style.background = 'var(--acid)'; t.style.color = '#0a0b0d'; t.style.borderColor = 'var(--acid)'; tags.appendChild(t); }
            header.appendChild(tags);
            card.appendChild(header);

            if (activeData.whyHere) card.appendChild(el('div', 'why-box', escapeHtml(activeData.whyHere)));

            const scoreRow = el('div', 'score-row-mini');
            [['Escalation', activeData.escalationScore], ['Opportunity', activeData.opportunityScore]].forEach(([label, val]) => {
                if (val === undefined || val === null) return;
                const item = el('div', 'score-item');
                item.appendChild(el('div', 'score-item-label', label));
                const bar = el('div', 'score-item-bar');
                bar.appendChild(el('span', 'score-item-val', String(val)));
                const track = el('div', 'score-track');
                const fill = el('div', 'score-fill'); fill.style.width = `${val}%`; fill.style.background = meta.color;
                track.appendChild(fill); bar.appendChild(track); item.appendChild(bar); scoreRow.appendChild(item);
            });
            card.appendChild(scoreRow);

            if (Array.isArray(activeData.secondaryKeywords) && activeData.secondaryKeywords.length) {
                card.appendChild(el('div', 'insights-item-label', 'Keywords for this beat'));
                const row = el('div', 'insights-tags-grid');
                activeData.secondaryKeywords.forEach(k => row.appendChild(makeCopyChip(k)));
                card.appendChild(row);

                const platRow = el('div', 'platform-row');
                platRow.appendChild(platformBtn('youtube', 'Search', PLATFORM_CFG.youtube.searchUrl(activeData.primaryKeyword || activeData.secondaryKeywords[0])));
                platRow.appendChild(platformBtn('tiktok', 'Search', PLATFORM_CFG.tiktok.searchUrl(activeData.primaryKeyword || activeData.secondaryKeywords[0])));
                card.appendChild(platRow);
            }

            wrap.appendChild(card);
            return wrap;
        }

        function renderEvidenceView(data) {
            const wrap = el('div', 'insights-card');
            wrap.appendChild(el('div', 'insights-card-title', '📚 Real videos found (grounded evidence)'));
            const realVideos = Array.isArray(data.real_videos) ? data.real_videos : [];
            if (realVideos.length === 0) { wrap.appendChild(el('div', 'evidence-no-data', 'No grounded YouTube videos returned for this topic yet.')); return wrap; }
            const sorted = [...realVideos].sort((a, b) => (b.viewCount || 0) - (a.viewCount || 0));
            sorted.forEach(v => wrap.appendChild(renderEvidenceItem(v)));
            return wrap;
        }

        function renderEvidenceItem(v) {
            const a = document.createElement('a');
            a.className = 'evidence-item'; a.href = v.url || '#'; a.target = '_blank'; a.rel = 'noopener noreferrer';
            const ytId = extractYouTubeId(v.url) || v.videoId;
            const thumb = v.thumbnail || (ytId ? `https://img.youtube.com/vi/${ytId}/hqdefault.jpg` : null);
            if (thumb) {
                const img = document.createElement('img'); img.className = 'evidence-thumb'; img.src = thumb; img.loading = 'lazy';
                img.onerror = () => { img.style.display = 'none'; };
                a.appendChild(img);
            } else a.appendChild(el('div', 'evidence-thumb'));
            const info = el('div', 'evidence-info');
            info.appendChild(el('div', 'evidence-info-title', escapeHtml(v.title || 'Untitled')));
            const views = v.viewCount || 0;
            info.appendChild(el('div', 'evidence-info-meta', `${views > 0 ? `<span class="views">${formatViews(views)} views</span>` : ''}${views > 0 && v.channel ? ' · ' : ''}${escapeHtml(v.channel || '')}`));
            a.appendChild(info);
            return a;
        }

        function renderSourcesView(data) {
            const wrap = el('div');

            const seoCard = el('div', 'insights-card');
            seoCard.appendChild(el('div', 'insights-card-title', '🚀 SEO'));
            if (data.seo_keywords) {
                seoCard.appendChild(el('div', 'insights-item-label', 'Keywords'));
                const row = el('div', 'insights-tags-grid'); row.style.marginBottom = '14px';
                String(data.seo_keywords).split(',').map(s => s.trim()).filter(Boolean).forEach(k => row.appendChild(makeCopyChip(k)));
                seoCard.appendChild(row);
            }
            if (Array.isArray(data.best_hashtags) && data.best_hashtags.length) {
                seoCard.appendChild(el('div', 'insights-item-label', 'Hashtags'));
                const row = el('div', 'insights-tags-grid');
                data.best_hashtags.forEach(h => row.appendChild(makeCopyChip(h.startsWith('#') ? h : '#' + h)));
                seoCard.appendChild(row);
            }
            if (!data.seo_keywords && !(data.best_hashtags || []).length) seoCard.appendChild(el('div', 'empty-panel', 'No SEO data generated.'));
            wrap.appendChild(seoCard);

            const searchCard = el('div', 'insights-card');
            searchCard.appendChild(el('div', 'insights-card-title', '🔎 Cross-platform search — find original source clips'));
            searchCard.appendChild(el('div', 'insights-item-value', 'Real search links (not scraped) for the queries this run generated. Click to open native results on each platform and find original creators yourself.'));

            const groups = [
                ['YouTube queries', data.youtube_queries, 'youtube'],
                ['TikTok queries', data.tiktok_queries, 'tiktok'],
                ['Reddit queries', data.reddit_queries, 'reddit'],
            ];
            groups.forEach(([label, queries, platform]) => {
                if (!Array.isArray(queries) || !queries.length) return;
                const block = el('div'); block.style.marginTop = '14px';
                block.appendChild(el('div', 'insights-item-label', label));
                const row = el('div', 'platform-row');
                queries.forEach(q => row.appendChild(platformBtn(platform, q.length > 30 ? q.slice(0, 30) + '…' : q, PLATFORM_CFG[platform].searchUrl(q))));
                block.appendChild(row);
                searchCard.appendChild(block);
            });

            if (Array.isArray(data.best_subreddits) && data.best_subreddits.length) {
                const block = el('div'); block.style.marginTop = '14px';
                block.appendChild(el('div', 'insights-item-label', 'Subreddits to check'));
                const row = el('div', 'platform-row');
                data.best_subreddits.forEach(s => row.appendChild(platformBtn('reddit', 'r/' + s, `https://www.reddit.com/r/${s}/top/?t=all`)));
                block.appendChild(row);
                searchCard.appendChild(block);
            }
            wrap.appendChild(searchCard);

            return wrap;
        }

        function makeCopyChip(text) {
            const chip = el('span', 'kw-chip', escapeHtml(text));
            chip.addEventListener('click', () => {
                navigator.clipboard?.writeText(text).then(() => {
                    chip.classList.add('copied');
                    setTimeout(() => chip.classList.remove('copied'), 1200);
                });
            });
            return chip;
        }

        function copyResults(data) {
            const ranks = Array.isArray(data.ranks) ? data.ranks : [];
            const lines = [
                `📊 ${data.topic || appState.topic}`, data.overall_opportunity_reasoning || '', '',
                ...ranks.map(r => `#${r.rank} ${r.clipName || ''} — viral ${r.viralScore?.final ?? '–'}/100, ${r.rarity || ''}, ${r.competition || ''} competition`),
                '', data.seo_keywords ? `Keywords: ${data.seo_keywords}` : '',
            ].filter(Boolean);
            navigator.clipboard?.writeText(lines.join('\n')).then(() => {
                updateState({ copied: true });
                setTimeout(() => updateState({ copied: false }), 2000);
            });
        }

        // ============================================================
        // ACTIONS
        // ============================================================
        async function handleResearch() {
            if (!appState.topic.trim()) { updateState({ error: 'Enter a topic first.' }); return; }
            updateState({ loading: true, error: null, researchData: null, restored: false });
            try {
                const payload = {
                    topic: appState.topic.trim(), dateFilter: '7 Days',
                    provider: appState.activeProvider, model: appState.selectedModel,
                    referenceChannels: parseReferenceChannels(appState.referenceChannels),
                    styleInstructions: appState.styleInstructions.trim(),
                };
                const result = await callWorkerAPI('/api/generate', payload);
                updateState({ loading: false, researchData: result, activeRank: 6, activeView: 'insights' });
            } catch (err) {
                updateState({ loading: false, error: err.message || 'Something went wrong during research.' });
            }
        }

        function handleNewSearch() {
            try { localStorage.removeItem(STORAGE_KEY); } catch (e) { /* ignore */ }
            updateState({ topic: '', researchData: null, error: null, restored: false, activeRank: 6, copied: false, activeView: 'insights' });
        }

        // ============================================================
        // BOOT — synchronous, no network dependency.
        // ============================================================
        function initApp() { restoreState(); renderApp(); }
        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
