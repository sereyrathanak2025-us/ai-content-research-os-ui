        async function runDiscovery({ task, platform, providerName, model, timeout }) {
          const agentStartTime = Date.now();
          let agentOutput = {
            agent: "DiscoveryAgent", version: "1.0.0",
            capability: ["viral discovery", "trend analysis", "keyword extraction", "youtube grounding"],
            result: { videoCandidates: [], youtubeLinks: [], viewCounts: [], channels: [], trendSignals: [], keywords: [], realVideos: [] },
            metadata: { provider: "N/A", model: "N/A", latency: 0, timestamp: new Date().toISOString() },
            error: null
          };

          // Vary repeat searches of the same topic — rotate the date window and nudge the
          // query so the same request isn't sent twice in a row. This is a client-side
          // mitigation only: the actual grounded search runs inside the Cloudflare Worker
          // (/api/generate), whose source we don't control, so it can't fully guarantee
          // fresh results if the Worker itself caches by exact query text.
          const DATE_FILTERS = ["7 Days", "30 Days", "This Month", "This Year"];
          const VARIATION_HINTS = ["", " (surface different channels than typical top results)", " (include more recent uploads)", " (prioritize less mainstream creators)"];
          let dateFilter = DATE_FILTERS[0], searchQuery = task;
          try {
            const seenKey = 'viralRadarSeen_' + task.trim().toLowerCase().replace(/\s+/g, '_').slice(0, 60);
            const seenCount = parseInt(localStorage.getItem(seenKey) || '0', 10);
            dateFilter = DATE_FILTERS[seenCount % DATE_FILTERS.length];
            const hint = VARIATION_HINTS[seenCount % VARIATION_HINTS.length];
            searchQuery = task + hint;
            localStorage.setItem(seenKey, String(seenCount + 1));
          } catch (e) { /* localStorage unavailable — proceed without variation */ }

          try {
            const llmResponse = await AIProvider.generateWithYouTube(task, {
              providerName, model, timeout, dateFilter, searchQuery
            });

            if (llmResponse.success) {
              const llmData = llmResponse.data;

              const realVideos = Array.isArray(llmData.real_videos) ? llmData.real_videos : [];
              agentOutput.result.realVideos = realVideos;
              agentOutput.result.videoCandidates = realVideos.map(v => v.title || "");
              agentOutput.result.youtubeLinks = realVideos.map(v => v.url || "");
              agentOutput.result.viewCounts = realVideos.map(v => v.viewCount || 0);
              agentOutput.result.channels = realVideos.map(v => v.channel || "");

              agentOutput.result.trendSignals = Array.isArray(llmData.trendSignals) ? llmData.trendSignals : (llmData.why_trending ? [llmData.why_trending] : []);
              agentOutput.result.keywords = (llmData.seo_keywords || "").split(",").map(k => k.trim()).filter(Boolean);

              agentOutput.metadata.provider = llmResponse.provider || "Unknown";
              agentOutput.metadata.model = llmResponse.model || "Unknown";
              agentOutput.metadata.latency = llmResponse.metadata?.latency || (Date.now() - agentStartTime);
              agentOutput.metadata.timestamp = llmResponse.metadata?.timestamp || new Date().toISOString();
            } else {
              agentOutput.error = llmResponse.error || `LLM analysis failed for Discovery Agent`;
            }
          } catch (err) {
            agentOutput.error = `Discovery Agent execution error: ${err.message}`;
          } finally {
            agentOutput.metadata.latency = Date.now() - agentStartTime;
          }
          return agentOutput;
        }

            if (llmResponse.success && llmResponse.data) {

              agentOutput.result.viralScore = getValidScore(llmData.viralScore);

              agentOutput.result.finalScore = Math.round(
                (agentOutput.result.viralScore * scoringWeights.viral) +
                (agentOutput.result.emotionScore * scoringWeights.emotion) +

                (agentOutput.result.hookScore * scoringWeights.hook) +

        async function runRanking({ contentDescription, platform, providerName, model, timeout }) {
          const agentStartTime = Date.now();
          let agentOutput = {
            agent: "RankingAgent", version: "1.0.0",
            capability: ["content ranking", "retention prediction", "narrative structuring", "6-rank viral framework", "retention optimization"],
            result: { rankOrder: [], retentionPrediction: "No ranking performed." },
            metadata: { provider: "N/A", model: "N/A", latency: 0, timestamp: new Date().toISOString() },
            error: null
          };

          try {
            const prompt = `Create a 6-rank narrative structure for: "${contentDescription}" (${platform || 'general'} platform). Use exactly these ranks with segment names:
            6=Hook, 5=Interest, 4=Context, 3=Escalation, 2=False Winner, 1=Payoff

            For EACH rank item, also include a "momentSuggestion" object with editorial guidance (a suggestion, not a verified fact — you have not watched any video frame-by-frame):
            { "suggestion": "short editorial idea for this beat, e.g. 'lead with a fast zoom on the reaction'", "confidence": 0.0-1.0 }

            Provide ONLY valid JSON with rankOrder array (6 items exactly) and retentionPrediction. NO prose, NO markdown.

            REQUIRED JSON FORMAT:
            { "rankOrder": [{"rank": "#6", "segment": "Hook", "content": "...", "momentSuggestion": {"suggestion": "...", "confidence": 0.7}}, ...], "retentionPrediction": "..." }`;

            const llmResponse = await AIProvider.analyze(prompt, {
              providerName, model, timeout,
              outputSchema: {
                type: "object",
                properties: {
                  rankOrder: {
                    type: "array",
                    items: { type: "object", properties: {
                      rank: { type: "string" }, segment: { type: "string" }, content: { type: "string" },
                      momentSuggestion: { type: "object", properties: { suggestion: { type: "string" }, confidence: { type: "number", minimum: 0, maximum: 1 } } }
                    }, required: ["rank", "segment", "content"] },
                    minItems: 6, maxItems: 6
                  },
                  retentionPrediction: { type: "string" }
                },
                required: ["rankOrder", "retentionPrediction"]
              }
            });

            if (llmResponse.success && llmResponse.data) {
              const llmData = llmResponse.data;
              let validatedRankOrder = [];
              if (Array.isArray(llmData.rankOrder) && llmData.rankOrder.length === 6) {
                const parsedRanks = llmData.rankOrder.map((rankItem, idx) => {
                  const rawRank = rankItem.rank;
                  let rankNum = 0;
                  if (typeof rawRank === 'number') { rankNum = rawRank; }
                  else if (typeof rawRank === 'string') { rankNum = parseInt(rawRank.replace('#', '').trim(), 10) || 0; }
                  if (!rankNum && llmData.rankOrder.length === 6) { rankNum = 6 - idx; }
                  // Label editorial guidance explicitly as AI_SUGGESTION per JSON_CONTRACT.md v0.2 —
                  // never presented as verified evidence, always requires human review.
                  const rawSuggestion = rankItem.momentSuggestion;
                  const momentSuggestion = rawSuggestion && rawSuggestion.suggestion ? {
                    type: "AI_SUGGESTION",
                    suggestion: String(rawSuggestion.suggestion),
                    confidence: typeof rawSuggestion.confidence === 'number' ? Math.min(1, Math.max(0, rawSuggestion.confidence)) : 0.5,
                    requires_human_review: true
                  } : null;
                  return { ...rankItem, rank: rankItem.rank ? String(rankItem.rank) : `#${rankNum}`, rankNum: Number.isInteger(rankNum) ? rankNum : 0, momentSuggestion };
                }).filter(item => item.rankNum >= 1 && item.rankNum <= 6);

                parsedRanks.sort((a, b) => b.rankNum - a.rankNum);
                const uniqueRanks = new Set();
                validatedRankOrder = parsedRanks.filter(item => {
                  if (!uniqueRanks.has(item.rankNum)) { uniqueRanks.add(item.rankNum); return true; }
                  return false;
                }).map(({ rankNum, ...rest }) => rest);

                if (validatedRankOrder.length !== 6) {
                  agentOutput.error = "LLM did not return a valid 6-rank structure.";
                  validatedRankOrder = [];
                }
              } else {
                agentOutput.error = "LLM did not return a valid 6-rank structure. Incorrect array length.";
              }

              agentOutput.result.rankOrder = validatedRankOrder;
              agentOutput.result.retentionPrediction = llmData.retentionPrediction || "Retention prediction unavailable.";
              agentOutput.metadata.provider = llmResponse.provider || "Unknown";
              agentOutput.metadata.model = llmResponse.model || "Unknown";
              agentOutput.metadata.latency = llmResponse.metadata?.latency || (Date.now() - agentStartTime);
              agentOutput.metadata.timestamp = llmResponse.metadata?.timestamp || new Date().toISOString();
            } else {
              agentOutput.error = llmResponse.error || `LLM analysis failed for Ranking Agent`;
            }
          } catch (err) {
            agentOutput.error = `Ranking Agent execution error: ${err.message}`;
          } finally {
            agentOutput.metadata.latency = Date.now() - agentStartTime;
          }
          return agentOutput;
        }

          seo: { agentFunction: runSeo, version: "1.0.0", capability: ["seo generation", "keyword optimization", "content discoverability"] },
          competitor: { agentFunction: runCompetitorAnalysis, version: "1.0.0", capability: ["competitor analysis", "pattern extraction", "winning format identification", "content gap analysis"] },
          intelligence: { agentFunction: runIntelligence, version: "1.0.0", capability: ["cross-video pattern synthesis (AI_SUGGESTION)", "opportunity gap analysis (AI_SUGGESTION)"] }
        };

        const AgentRouter = {
          async routeTask(task, agentType, options = {}) {
            const startTime = Date.now();
            const agentConfig = AgentRegistry[agentType.toLowerCase()];

            let agentResult = {
              agent: agentType, version: agentConfig?.version || "N/A", capability: agentConfig?.capability || [],
              task: task, result: null, error: null,
              metadata: { totalLatency: 0, success: false, timestamp: new Date().toISOString() }
            };

            if (!agentConfig || typeof agentConfig.agentFunction !== 'function') {
              agentResult.error = `Agent type "${agentType}" not found or not properly configured in AgentRegistry.`;
              return agentResult;
            }

            try {
              const individualAgentOutput = await agentConfig.agentFunction({
                contentDescription: task, task, ...options
              });

              agentResult.result = individualAgentOutput.result;
              agentResult.error = individualAgentOutput.error;
              agentResult.metadata = { ...agentResult.metadata, ...individualAgentOutput.metadata, success: !individualAgentOutput.error };
              agentResult.agent = individualAgentOutput.agent;
              agentResult.version = individualAgentOutput.version;
              agentResult.capability = individualAgentOutput.capability;

            } catch (err) {
              agentResult.error = err.message;
              agentResult.metadata.success = false;
            } finally {
              agentResult.metadata.totalLatency = Date.now() - startTime;
            }

            return agentResult;
          },

          listAgentTypes() {
            return Object.keys(AgentRegistry).map(key => ({
              type: key,
              version: AgentRegistry[key].version,
              capability: AgentRegistry[key].capability
            }));
          }
        };

        const { useState, useEffect } = React;

        // ---------- UI HELPERS ----------

        function extractYouTubeId(url) {
          if (!url) return null;
          const m = url.match(/(?:youtu\.be\/|v=|shorts\/)([a-zA-Z0-9_-]{6,})/);
          return m ? m[1] : null;
        }

        function formatViews(n) {
          if (!n) return null;
          if (n >= 1000000) return (n / 1000000).toFixed(1).replace(/\.0$/, '') + 'M';
          if (n >= 1000) return (n / 1000).toFixed(1).replace(/\.0$/, '') + 'K';
          return String(n);
        }

        function AgentHeader({ index, title, meta }) {
          return (
            <div className="agent-head">
              <div className="agent-title-row">
                <span className="agent-index">{index}</span>
                <span className="agent-title">{title}</span>
              </div>
              {meta && (
                <span className="agent-meta">
                  <b>{meta.provider}</b> · {meta.latency}ms
                </span>
              )}
            </div>
          );
        }

        function CopyChip({ text }) {
          const [copied, setCopied] = useState(false);
          const handleCopy = () => {
            navigator.clipboard?.writeText(text).then(() => {
              setCopied(true);
              setTimeout(() => setCopied(false), 1400);
            });
          };
          return (
            <span className={`copy-chip ${copied ? 'copied' : ''}`} onClick={handleCopy}>
              {copied ? '✓ copied' : text}
            </span>
          );
        }

        function CountUp({ value, duration = 700 }) {
          const [display, setDisplay] = useState(0);
          useEffect(() => {
            let raf;
            const start = performance.now();
            const from = 0;
            const to = Number(value) || 0;
            const tick = (now) => {
              const progress = Math.min(1, (now - start) / duration);
              const eased = 1 - Math.pow(1 - progress, 3);
              setDisplay(Math.round(from + (to - from) * eased));
              if (progress < 1) raf = requestAnimationFrame(tick);
            };
            raf = requestAnimationFrame(tick);
            return () => cancelAnimationFrame(raf);
          }, [value]);
          return display;
        }

        function DiscoveryPanel({ result }) {
          const videos = (result.youtubeLinks || []).map((link, idx) => ({
            url: link,
            title: result.videoCandidates?.[idx] || 'Untitled',
            views: result.viewCounts?.[idx] || 0,
            channel: result.channels?.[idx] || '',
          })).filter(v => v.url);

          // Evidence-based featured pick: highest verified view count (not an AI opinion).
          let featured = null, rest = videos;
          if (videos.length > 1) {
            const maxViews = Math.max(...videos.map(v => v.views));
            if (maxViews > 0) {
              const idx = videos.findIndex(v => v.views === maxViews);
              featured = videos[idx];
              rest = videos.filter((_, i) => i !== idx);
            }
          }

          const renderThumb = (v) => {
            const ytId = extractYouTubeId(v.url);
            return ytId ? `https://img.youtube.com/vi/${ytId}/hqdefault.jpg` : null;
          };

          return (
            <div>
              {videos.length > 0 ? (
                <div>
                  {featured && (
                    <a href={featured.url} target="_blank" rel="noopener noreferrer" className="video-card featured">
                      <span className="featured-tag">◆ HIGHEST REACH · EVIDENCE</span>
                      <div className="featured-body">
                        {renderThumb(featured)
                          ? <img className="video-thumb featured-thumb" src={renderThumb(featured)} alt="" loading="lazy" onError={(e) => { e.target.style.display = 'none'; }} />
                          : <div className="video-thumb featured-thumb"></div>}
                        <div className="video-info">
                          <div className="video-title featured-title">{featured.title}</div>
                          <div className="video-sub">
                            {featured.views > 0 && <span className="views">{formatViews(featured.views)} views</span>}
                            {featured.views > 0 && featured.channel && ' · '}
                            {featured.channel}
                          </div>
                        </div>
                      </div>
                    </a>
                  )}
                  <div className="video-grid">
                    {rest.map((v, idx) => {
                      const thumb = renderThumb(v);
                      return (
                        <a key={idx} href={v.url} target="_blank" rel="noopener noreferrer" className="video-card">
                          {thumb
                            ? <img className="video-thumb" src={thumb} alt="" loading="lazy" onError={(e) => { e.target.style.display = 'none'; }} />
                            : <div className="video-thumb"></div>}
                          <div className="video-info">
                            <div className="video-title">{v.title}</div>
                            <div className="video-sub">
                              {v.views > 0 && <span className="views">{formatViews(v.views)} views</span>}
                              {v.views > 0 && v.channel && ' · '}
                              {v.channel}
                            </div>
                          </div>
                        </a>
                      );
                    })}
                  </div>
                </div>
              ) : (
                <div className="empty-panel">No grounded YouTube videos returned for this topic yet.</div>
              )}

              {result.keywords?.length > 0 && (
                <div>
                  <div className="tag-label" style={{ marginTop: 18 }}>Keywords</div>
                  <div className="tag-row">
                    {result.keywords.map((k, i) => <span key={i} className="kw-chip">{k}</span>)}
                  </div>
                </div>
              )}

              {result.trendSignals?.length > 0 && (
                <div>
                  <div className="tag-label" style={{ marginTop: 18 }}>Why it's trending</div>
                  <ul className="trend-list">
                    {result.trendSignals.map((s, i) => <li key={i}>{s}</li>)}
                  </ul>
                </div>
              )}
            </div>
          );
        }

        function ScoringPanel({ result }) {
          const bars = [
            ['Viral', result.viralScore], ['Emotion', result.emotionScore], ['Trend', result.trendScore],
            ['Hook', result.hookScore], ['Replay', result.replayScore], ['Rarity', result.rarityScore],
            ['Competition', result.competitionScore],
          ];
          return (
            <div>
              <div className="score-hero">
                <span className="num"><CountUp value={result.finalScore} /></span>
                <span className="lbl">/ 100 final score</span>
              </div>
              <div className="score-bars">
                {bars.map(([label, val]) => (
                  <div className="score-row" key={label}>
                    <span className="name">{label}</span>
                    <div className="score-track"><div className="score-fill" style={{ width: `${val}%` }}></div></div>
                    <span className="val"><CountUp value={val} duration={500} /></span>
                  </div>
                ))}
              </div>
              {result.reasoning && <div className="reasoning-box">{result.reasoning}</div>}
            </div>
          );
        }


        function RankingPanel({ result }) {
          return (
            <div>
              {result.rankOrder?.length > 0 ? (
                <div className="timeline">
                  {result.rankOrder.map((item, idx) => (
                    <div className="tl-item" key={idx}>
                      <span className="tl-dot">{item.rank?.replace('#', '')}</span>
                      <div className="tl-seg">{item.segment}</div>
                      <div className="tl-content">{item.content}</div>
                      {item.momentSuggestion?.suggestion && (
                        <div className="suggestion-box">
                          <span className="sugg-badge">AI SUGGESTION · {Math.round((item.momentSuggestion.confidence || 0) * 100)}%</span>
                          <span className="sugg-text">{item.momentSuggestion.suggestion}</span>
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              ) : (
                <div className="empty-panel">No ranked structure generated.</div>
              )}
              {result.retentionPrediction && (
                <div className="retention-box">
                  <div className="tag-label">Retention prediction</div>
                  {result.retentionPrediction}
                </div>
              )}
            </div>
          );
        }

        function IntelligencePanel({ result }) {
          const patterns = result.crossVideoPatterns || [];
          const gap = result.opportunityGap;
          return (
            <div>
              {patterns.length > 0 ? (
                <div>
                  <div className="tag-label">Cross-video patterns <span className="sugg-badge inline">AI SUGGESTION</span></div>
                  <div className="pattern-list">
                    {patterns.map((p, i) => (
                      <div className="pattern-row" key={i}>
                        <span className="pattern-coverage">{p.coverage}</span>
                        <div>
                          <div className="pattern-name">{p.pattern}</div>
                          {p.note && <div className="pattern-note">{p.note}</div>}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              ) : (
                <div className="empty-panel">Not enough discovered videos yet to synthesize patterns.</div>
              )}

              {gap && (
                <div className="gap-box">
                  <div className="tag-label">Opportunity gap <span className="sugg-badge inline">AI SUGGESTION</span></div>
                  {gap.existingFocus && <div className="gap-row"><b>Existing videos focus on:</b> {gap.existingFocus}</div>}
                  {gap.underusedAngle && <div className="gap-row"><b>Underused angle:</b> {gap.underusedAngle}</div>}
                  {gap.differentiation && <div className="gap-row"><b>Try:</b> {gap.differentiation}</div>}
                </div>
              )}
            </div>
          );
        }

        function SeoPanel({ result }) {
          return (
            <div>
              <div className="seo-preview">
                <div className="seo-title">{result.title}</div>
                <div className="seo-desc">{result.description}</div>
              </div>
              {result.keywords?.length > 0 && (
                <div>
                  <div className="tag-label">Keywords</div>
                  <div className="tag-row">
                    {result.keywords.map((k, i) => <CopyChip key={i} text={k} />)}
                  </div>
                </div>
              )}
              {result.hashtags?.length > 0 && (
                <div>
                  <div className="tag-label" style={{ marginTop: 16 }}>Hashtags</div>
                  <div className="tag-row">
                    {result.hashtags.map((h, i) => <CopyChip key={i} text={h} />)}
                  </div>
                </div>
              )}
            </div>
          );
        }

        function CompetitorPanel({ result }) {
          return (
            <div>
              {result.competitorPatterns?.length > 0 && (
                <div className="comp-grid">
                  {result.competitorPatterns.map((c, i) => (
                    <div className="comp-card" key={i}>
                      <div className="comp-name">{c.name}</div>
                      <div className="comp-strategy">{c.strategy}</div>
                      <div className="comp-formats">▸ {c.winningFormats}</div>
                    </div>
                  ))}
                </div>
              )}
              {result.contentGaps?.length > 0 && (
                <div>
                  <div className="tag-label">Content gaps you can exploit</div>
                  <ul className="gap-list">
                    {result.contentGaps.map((g, i) => <li key={i}>{g}</li>)}
                  </ul>
                </div>
              )}
            </div>
          );
        }

        const AGENT_DISPLAY = {
          discovery: { title: 'Discovery', Panel: DiscoveryPanel },
          scoring: { title: 'Scoring', Panel: ScoringPanel },
          ranking: { title: 'Ranking', Panel: RankingPanel },
          intelligence: { title: 'Intelligence', Panel: IntelligencePanel },
          seo: { title: 'SEO', Panel: SeoPanel },
          competitor: { title: 'Competitor', Panel: CompetitorPanel },
        };

        const SURPRISE_NICHES = [
          "ranking the worst martial arts fails", "don't check the sound moments", "funniest chicken scream compilations",
          "instant regret prank fails", "optical illusion moments that break your brain", "gym fails that hurt to watch",
          "ranking the most unexpected plot twists caught on camera", "wait for it fail compilations", "fake wave prank reactions",
          "perfect timing coincidences caught on camera", "things that shouldn't have worked but did", "ranking worst decisions caught on camera",
          "animals ruining everything compilation", "don't trust your eyes illusions", "public prank reactions gone wrong",
          "ranking the most savage comebacks caught on camera", "near miss moments that will make you gasp",
          "ranking the funniest scream reactions", "instant karma caught on camera", "things that look fake but are 100% real",
        ];

        const STORAGE_KEY = 'viralRadarState_v1';

        function App() {
          const [topic, setTopic] = useState('');
          const [platform, setPlatform] = useState('YouTube');
          const [loading, setLoading] = useState(false);
          const [error, setError] = useState(null);
          const [results, setResults] = useState(null);
          const [activeProvider, setActiveProvider] = useState(AIProvider.getCurrentProviderName());
          const [availableModels, setAvailableModels] = useState([]);
          const [selectedModel, setSelectedModel] = useState('');
          const [restored, setRestored] = useState(false);

          useEffect(() => {
            const config = AIProvider.listProviders();
            let cur = AIProvider.getCurrentProviderName();
            let provider = config[cur];

            // Restore last session (topic, platform, provider/model, results) so switching
            // apps or reopening the tab does not lose prior research. Only an explicit
            // "New search" click or clearing site data resets this.
            try {
              const saved = localStorage.getItem(STORAGE_KEY);
              if (saved) {
                const parsed = JSON.parse(saved);
                if (parsed.topic) setTopic(parsed.topic);
                if (parsed.platform) setPlatform(parsed.platform);
                if (parsed.provider && config[parsed.provider]) {
                  cur = parsed.provider;
                  AIProvider.setProvider(cur);
                  provider = config[cur];
                }
                if (parsed.results) setResults(parsed.results);
                setRestored(!!parsed.results);
              }
            } catch (e) { /* localStorage unavailable (private mode) — ignore, app still works */ }

            if (provider) {
              setActiveProvider(cur);
              setAvailableModels(provider.models || []);
              const savedModel = (() => {
                try {
                  const saved = localStorage.getItem(STORAGE_KEY);
                  return saved ? JSON.parse(saved).model : null;
                } catch (e) { return null; }
              })();
              setSelectedModel((savedModel && provider.models?.some(m => m.id === savedModel)) ? savedModel : (provider.models?.[0]?.id || ''));
            }
          }, []);

          const persist = (data) => {
            try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch (e) { /* ignore quota/private mode errors */ }
          };

          const handleProviderChange = (e) => {
            const name = e.target.value;
            AIProvider.setProvider(name);
            const cfg = AIProvider.listProviders()[name];
            setActiveProvider(name);
            setAvailableModels(cfg?.models || []);
            setSelectedModel(cfg?.models?.[0]?.id || '');
          };

          const handleNewSearch = () => {
            setResults(null);
            setError(null);
            setTopic('');
            setRestored(false);
            try { localStorage.removeItem(STORAGE_KEY); } catch (e) { /* ignore */ }
          };

          const handleResearch = async () => {
            if (!topic.trim()) { setError("Enter a topic first."); return; }
            setLoading(true);
            setError(null);
            setResults(null);
            setRestored(false);

            try {
              const options = { platform, providerName: activeProvider, model: selectedModel, timeout: 120000 };
              const allAgentResults = {};

              // Discovery runs first — its real video titles feed the Intelligence agent below.
              allAgentResults.discovery = await AgentRouter.routeTask(topic, 'discovery', options);
              const videoTitles = allAgentResults.discovery?.result?.videoCandidates || [];

              for (const key of ['scoring', 'ranking', 'intelligence', 'seo', 'competitor']) {
                const agentOptions = key === 'intelligence' ? { ...options, videoTitles } : options;
                allAgentResults[key] = await AgentRouter.routeTask(topic, key, agentOptions);
              }
              setResults(allAgentResults);
              persist({ topic, platform, provider: activeProvider, model: selectedModel, results: allAgentResults });
            } catch (err) {
              setError(err.message || "Something went wrong during research.");
            } finally {
              setLoading(false);
            }
          };

          const handleKeyDown = (e) => { if (e.key === 'Enter' && !loading) handleResearch(); };

          const handleSurpriseMe = () => {
            const pick = SURPRISE_NICHES[Math.floor(Math.random() * SURPRISE_NICHES.length)];
            setTopic(pick);
          };

          return (
            <div className="shell">
              <div className="nav">
                <div className="nav-brand">
                  <span className="nav-mark">✦</span>
                  <span className="nav-name">Viral Radar</span>
                </div>
                <span className="nav-badge">FREE · NO SIGNUP</span>
              </div>

              <div className="hero">
                <div className="hero-tag"><span className="dot"></span> 5 AI agents · real YouTube grounding</div>
                <h1>Stop guessing<br />what goes <span>viral</span>.</h1>
                <p>Drop in an idea. Get real videos, a viral score, a 6-beat retention structure, SEO, and competitor gaps — in one pass.</p>

                <div className="console">
                  <div className="console-head">
                    <span className="cdot" style={{ background: '#ff5f57' }}></span>
                    <span className="cdot" style={{ background: '#febc2e' }}></span>
                    <span className="cdot" style={{ background: '#28c840' }}></span>
                    <span style={{ marginLeft: 6 }}>research.sh</span>
                  </div>
                  <div className="console-body">
                    <div className="console-prompt">
                      <span className="caret">›</span>
                      <input
                        type="text"
                        value={topic}
                        onChange={(e) => setTopic(e.target.value)}
                        onKeyDown={handleKeyDown}
                        placeholder="how to grow a youtube channel fast"
                        disabled={loading}
                      />
                      {!topic && !loading && <span className="console-cursor"></span>}
                      <button type="button" className="surprise-btn" onClick={handleSurpriseMe} disabled={loading} title="Suggest a niche">🎲</button>
                    </div>

                    <div className="config-row">
                      <div className="select-wrap">
                        <select value={platform} onChange={(e) => setPlatform(e.target.value)} disabled={loading}>
                          <option>YouTube</option>
                          <option>TikTok</option>
                          <option>Instagram</option>
                          <option>Twitter</option>
                          <option>LinkedIn</option>
                        </select>
                      </div>
                      <div className="select-wrap">
                        <select value={activeProvider} onChange={handleProviderChange} disabled={loading}>
                          {Object.entries(AIProvider.listProviders()).map(([key, p]) => (
                            <option key={key} value={key}>{p.name}</option>
                          ))}
                        </select>
                      </div>
                      <div className="select-wrap">
                        <select value={selectedModel} onChange={(e) => setSelectedModel(e.target.value)} disabled={loading || !availableModels.length}>
                          {availableModels.map((m) => <option key={m.id} value={m.id}>{m.name}</option>)}
                        </select>
                      </div>
                    </div>

                    <button className="run-btn" onClick={handleResearch} disabled={loading}>
                      {loading ? 'Scanning…' : <>Run Research →</>}
                    </button>
                  </div>
                </div>

                <div className="agent-strip">
                  {['Discovery', 'Scoring', 'Ranking', 'Intelligence', 'SEO', 'Competitor'].map((a) => (
                    <span className="agent-chip" key={a}>{a}Agent</span>
                  ))}
                </div>

                {error && <div className="error-box">⚠ {error}</div>}
              </div>

              {loading && (
                <div className="loading-box">
                  <div className="spinner" style={{ margin: '0 auto' }}></div>
                  <p>running 5 agents · up to 2 min on cold providers</p>
                </div>
              )}

              {results && !loading && (
                <div className="results">
                  <div className="results-topbar">
                    {restored ? <span className="restored-tag">↺ restored from your last visit</span> : <span></span>}
                    <button className="new-search-btn" onClick={handleNewSearch}>New search</button>
                  </div>
                  {Object.entries(results).map(([key, agentResult], idx) => {
                    const display = AGENT_DISPLAY[key] || { title: key, Panel: null };
                    const Panel = display.Panel;
                    return (
                      <div className="agent-block" key={key} style={{ animationDelay: `${idx * 0.06}s` }}>
                        <AgentHeader index={idx + 1} title={display.title} meta={!agentResult.error ? agentResult.metadata : null} />
                        {agentResult.error ? (
                          <div className="err-panel">⚠ {agentResult.error}</div>
                        ) : agentResult.result && Panel ? (
                          <Panel result={agentResult.result} />
                        ) : (
                          <div className="empty-panel">No results generated.</div>
                        )}
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
