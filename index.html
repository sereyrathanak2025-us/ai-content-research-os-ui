        * { margin: 0; padding: 0; box-sizing: border-box; }

        }

            content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
            background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);

        .console-body { padding: 4px 14px 16px; }

        .restored-tag { font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); }
        .new-search-btn { font-family: var(--font-mono); font-size: 11px; color: var(--text-dim); background: var(--bg-card); border: 1px solid var(--border-bright); padding: 7px 14px; border-radius: 20px; cursor: pointer; transition: all 0.12s ease; }

        .retention-curve-wrapper { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; padding: 18px 22px 12px; margin-bottom: 24px; display: flex; align-items: flex-end; gap: 7px; }

const WORKER_BASE_URL = "https://viral-discovery-proxy.fasterwgseverkh.workers.dev";
const DEFAULT_TIMEOUT = 120000;

async function callWorkerAPI(endpoint, payload, options = {}) {
  const workerUrl = WORKER_BASE_URL + endpoint;
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), options.timeout || DEFAULT_TIMEOUT);
  try {
    const res = await fetch(workerUrl, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
      signal: controller.signal
    });
    clearTimeout(timer);
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Worker request failed with status " + res.status);
    return data;
  } catch (err) {
    clearTimeout(timer);
    throw new Error(err.name === "AbortError" ? "Request timed out after " + (DEFAULT_TIMEOUT/1000) + "s." : err.message);
  }
}
